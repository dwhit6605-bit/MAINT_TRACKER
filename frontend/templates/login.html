<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAINT SUPER — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Open Sans', sans-serif; }
  body { min-height: 100vh; background-color: #1e3a5f; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .card { background: #fff; border-radius: 0.875rem; box-shadow: 0 20px 60px rgba(0,0,0,0.35); width: 100%; max-width: 380px; padding: 2.5rem 2rem; }
  .brand { text-align: center; margin-bottom: 2rem; }
  .brand-name { font-size: 1.6rem; font-weight: 700; letter-spacing: 0.12em; color: #141414; }
  .brand-sub { font-size: 0.75rem; color: #64748b; letter-spacing: 0.05em; margin-top: 0.25rem; }
  label { display: block; font-size: 0.875rem; font-weight: 600; color: #141414; margin-bottom: 0.3rem; }
  input { display: block; width: 100%; padding: 0.6rem 0.85rem; border: 1.5px solid #c8d8e8; border-radius: 0.5rem; font-size: 0.9rem; outline: none; transition: border-color 0.15s; font-family: inherit; }
  input:focus { border-color: #1e3a5f; box-shadow: 0 0 0 3px rgba(30,58,95,0.12); }
  .field { margin-bottom: 1.1rem; }
  .btn { width: 100%; padding: 0.7rem; background: #1e3a5f; color: #fff; border: none; border-radius: 0.5rem; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background 0.15s; margin-top: 0.5rem; letter-spacing: 0.02em; }
  .btn:hover { background: #2a4a70; }
  .btn:disabled { background: #94a3b8; cursor: not-allowed; }
  .error { background: #fef2f2; border: 1px solid #fca5a5; color: #dc2626; padding: 0.6rem 0.85rem; border-radius: 0.5rem; font-size: 0.85rem; margin-bottom: 1rem; display: none; }
  .error.show { display: block; }
  .divider { border-top: 1px solid #e2e8f0; margin: 1.5rem 0 0; text-align: center; padding-top: 1rem; font-size: 0.72rem; color: #94a3b8; }
</style>
</head>
<body>
<div class="card">
  <div class="brand">
    <div class="brand-name">MAINT SUPER</div>
    <div class="brand-sub">WHITWERX · MAINTENANCE OPS</div>
  </div>

  <div class="error" id="error-msg"></div>

  <form id="login-form" onsubmit="doLogin(event)">
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn" id="login-btn">Sign In</button>
  </form>

  <div class="divider">WHITWERX &copy; 2025</div>
</div>

<script>
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  const errEl = document.getElementById('error-msg');
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  btn.disabled = true;
  btn.textContent = 'Signing in…';
  errEl.classList.remove('show');

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await r.json();
    if (!r.ok) {
      errEl.textContent = data.detail || 'Login failed';
      errEl.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Sign In';
      return;
    }
    localStorage.setItem('auth_token', data.token);
    localStorage.setItem('auth_username', data.username);
    localStorage.setItem('auth_role', data.role);
    window.location.href = '/dashboard';
  } catch (err) {
    errEl.textContent = 'Network error — please try again';
    errEl.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}
</script>
</body>
</html>
