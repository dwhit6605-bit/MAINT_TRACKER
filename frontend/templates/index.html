  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#141414', light: '#2a2a2a', dark: '#0a0a0a' },
          },
          fontFamily: {
            sans: ['"Open Sans"', 'sans-serif'],
          }
        }

  </script>
  <style>
    /* ── Whitwerx palette ──
       #141414  near-black  (sidebar, buttons, headers)
       #1e3a5f  parchment   (page bg, active nav highlight)
       #696969  mid-gray    (secondary text, dividers)
       #FFFFFF  white       (cards, modals)
       #040404  text        (body copy)
    ── */
    *, *::before, *::after { font-family: 'Open Sans', sans-serif; }
    [x-cloak]{display:none!important}

    /* Nav */
    .nav-link { display:flex; align-items:center; gap:0.75rem; padding:0.625rem 1rem; border-radius:0.375rem; font-size:0.875rem; font-weight:500; transition:background-color 150ms; text-decoration:none; color:rgba(255,255,255,0.82); letter-spacing:0.01em; }

    .badge-gray   { display:inline-flex; align-items:center; padding:0.125rem 0.5rem; border-radius:0.25rem; font-size:0.75rem; font-weight:600; background-color:#e5e7eb; color:#374151; white-space:nowrap; }

    /* Cards */
    .card { background-color:#fff; border-radius:0.75rem; box-shadow:0 1px 4px rgba(0,0,0,0.08); border:1px solid #dce8f5; padding:1.25rem; }

    /* Buttons */
    .btn-primary { display:inline-flex; align-items:center; gap:0.5rem; padding:0.5rem 1rem; background-color:#1e3a5f; color:#fff; font-size:0.875rem; font-weight:600; border-radius:0.375rem; border:none; cursor:pointer; transition:background-color 150ms; letter-spacing:0.01em; }
    .btn-primary:hover { background-color:#2a4a70; }
    .btn-secondary { display:inline-flex; align-items:center; gap:0.5rem; padding:0.5rem 1rem; background-color:#fff; color:#141414; font-size:0.875rem; font-weight:500; border-radius:0.375rem; border:1px solid #c8d8e8; cursor:pointer; transition:background-color 150ms; }
    .btn-secondary:hover { background-color:#dce8f5; }
    .btn-danger { display:inline-flex; align-items:center; gap:0.5rem; padding:0.375rem 0.75rem; background-color:#fef2f2; color:#dc2626; font-size:0.75rem; font-weight:500; border-radius:0.375rem; border:none; cursor:pointer; transition:background-color 150ms; }
    .btn-danger:hover { background-color:#fee2e2; }

    /* Inputs */
    .input { display:block; width:100%; border-radius:0.375rem; border:1px solid #c8d8e8; padding:0.5rem 0.75rem; font-size:0.875rem; box-shadow:0 1px 2px rgba(0,0,0,0.04); outline:none; box-sizing:border-box; background:#fff; font-family:inherit; }
    .input:focus { border-color:#141414; box-shadow:0 0 0 2px rgba(20,20,20,0.12); }
    .label { display:block; font-size:0.875rem; font-weight:600; color:#141414; margin-bottom:0.25rem; }

    /* Table */
    .table-row { transition:background-color 150ms; }
    .table-row:hover { background-color:#f4f8fc; }

    /* Modal */
    .modal-backdrop { position:fixed; inset:0; background-color:rgba(0,0,0,0.55); z-index:40; display:flex; align-items:center; justify-content:center; padding:1rem; }
    .modal { background-color:#fff; border-radius:0.75rem; box-shadow:0 25px 50px rgba(0,0,0,0.3); width:100%; max-width:32rem; max-height:90vh; overflow-y:auto; z-index:50; position:relative; }

    /* ── Mobile ── */

    #sidebar-overlay.open { display:block; }

    #hamburger:hover { background:#f3f4f6; }
    @media (max-width: 768px) {

      #dispatch-backdrop table td:last-child { display:none; }

      #dispatch-backdrop table td:nth-child(2) { width:auto; }
      /* SAT/UNSAT radios — stack vertically on small screens */
      #dispatch-backdrop .modal label { flex-direction:column; gap:1px; font-size:0.7rem; }

</head>

<script>
// ─── Utilities ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const el = (tag, cls, html) => { const e = document.createElement(tag); if(cls) e.className=cls; if(html!=null) e.innerHTML=html; return e; };

// ─── Auth ─────────────────────────────────────────────────────────────────────
let currentUser = null;
function getToken() { return localStorage.getItem('auth_token'); }
function isAdmin() { return currentUser?.role === 'admin'; }
function isTech()  { return currentUser?.role === 'admin' || currentUser?.role === 'tech'; }
function logout() {
  ['auth_token','auth_username','auth_role'].forEach(k => localStorage.removeItem(k));
  window.location.href = '/login';
}
async function initAuth() {
  const token = getToken();
  if (!token) { window.location.href = '/login'; return false; }
  try {
    currentUser = await fetch('/api/auth/me', {
      headers: { 'Authorization': 'Bearer ' + token }
    }).then(r => { if (!r.ok) throw new Error(); return r.json(); });
    const badge = $('user-badge');
    if (badge) {
      badge.style.display = 'flex';
      $('user-name').textContent = currentUser.username;
      const roleEl = $('user-role-badge');
      roleEl.textContent = currentUser.role;
      const roleBg  = {admin:'#fee2e2', tech:'#fef3c7', operator:'#dce8f5'}[currentUser.role] || '#dce8f5';
      const roleClr = {admin:'#b91c1c', tech:'#92400e', operator:'#1e3a5f'}[currentUser.role] || '#1e3a5f';
      roleEl.style.cssText = `font-size:0.65rem;padding:1px 6px;border-radius:9999px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;background:${roleBg};color:${roleClr};`;
    }
    if (isAdmin()) document.querySelectorAll('.admin-nav').forEach(el => el.style.display = '');
    return true;
  } catch(e) {
    localStorage.removeItem('auth_token');
    window.location.href = '/login';
    return false;
  }
}

async function api(method, path, body) {
  const token = getToken();
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (r.status === 401) { localStorage.removeItem('auth_token'); window.location.href = '/login'; return; }
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.detail || r.statusText); }
  return r.json();
}

function toast(msg, ok=true) {
  const t = $('toast'), ti = $('toast-inner');
  ti.textContent = msg;
  ti.className = `px-4 py-3 rounded-lg shadow-lg text-sm font-medium text-white ${ok?'bg-green-600':'bg-red-600'}`;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 3000);
}

function fmtDate(d) { return d ? new Date(d+'T00:00:00').toLocaleDateString() : '—'; }
function daysUntil(d) {
  if (!d) return null;
  return Math.round((new Date(d+'T00:00:00') - new Date()) / 86400000);
}
function dueBadge(d, statusOverride) {
  if (statusOverride === 'overdue' || statusOverride === 'fail') return `<span class="badge-red">${statusOverride==='fail'?'FAIL':'Overdue'}</span>`;
  if (statusOverride === 'completed') return `<span class="badge-green">Done</span>`;
  const days = daysUntil(d);
  if (days === null) return `<span class="badge-gray">No date</span>`;
  if (days < 0)  return `<span class="badge-red">Overdue ${Math.abs(days)}d</span>`;
  if (days <= 7) return `<span class="badge-yellow">Due in ${days}d</span>`;
  if (days <= 30) return `<span class="badge-blue">Due in ${days}d</span>`;
  return `<span class="badge-gray">${fmtDate(d)}</span>`;
}

function modal(html, onload) {
  const mc = $('modal-container');
  mc.innerHTML = `<div class="modal-backdrop" id="modal-backdrop">${html}</div>`;
  if (onload) onload();
  $('modal-backdrop').addEventListener('click', e => { if(e.target.id==='modal-backdrop') closeModal(); });
}
function closeModal() { $('modal-container').innerHTML = ''; }


// ─── Mobile sidebar ──────────────────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ─── Overdue banner ───────────────────────────────────────────────────────────
function showOverdueBanner(overdueTasks, overdueCals) {
  if (document.getElementById('overdue-banner')) return; // already shown
  if (!overdueTasks && !overdueCals) return;
  const parts = [];
  if (overdueTasks) parts.push(`${overdueTasks} overdue maintenance task${overdueTasks>1?'s':''}`);
  if (overdueCals)  parts.push(`${overdueCals} overdue calibration${overdueCals>1?'s':''}`);
  const banner = document.createElement('div');
  banner.id = 'overdue-banner';
  banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:200;background:#dc2626;color:#fff;padding:0.6rem 1.25rem;display:flex;align-items:center;justify-content:space-between;font-size:0.85rem;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.25);';
  banner.innerHTML = `<span>⚠ ${parts.join(' · ')} — action required</span><button onclick="this.parentElement.remove()" style="background:none;border:none;color:#fff;font-size:1.1rem;cursor:pointer;padding:0 0.25rem;line-height:1;">✕</button>`;
  document.body.prepend(banner);
}

function toggleAllEq(checked) {
  document.querySelectorAll('.eq-row-check').forEach(cb => cb.checked = checked);
  updateBulkBar();
}

function updateBulkBar() {
  const checked = document.querySelectorAll('.eq-row-check:checked');
  const bar = document.getElementById('eq-bulk-bar');
  if (!bar) return;
  if (checked.length > 0) {
    bar.style.display = 'flex';
    document.getElementById('eq-bulk-count').textContent = `${checked.length} selected`;
  } else {
    bar.style.display = 'none';
  }
}

function clearEqSelection() {
  document.querySelectorAll('.eq-row-check').forEach(cb => cb.checked = false);
  const ca = document.getElementById('eq-check-all');
  if (ca) ca.checked = false;
  updateBulkBar();
}

async function bulkSetStatus(status) {
  const ids = [...document.querySelectorAll('.eq-row-check:checked')].map(cb => parseInt(cb.dataset.id));
  if (!ids.length) return;
  if (!confirm(`Set ${ids.length} item${ids.length>1?'s':''} to "${status}"?`)) return;
  await Promise.all(ids.map(id => {
    const eq = equipmentData.find(e => e.id === id);
    if (!eq) return;
    return api('PUT', `/api/equipment/${id}`, { ...eq, status });
  }));
  clearEqSelection();
  await refreshEquipment();
}

function equipmentRows(rows) {
  const sc = {active:'badge-green',inactive:'badge-gray',retired:'badge-red',maintenance:'badge-yellow'};
  return rows.map(e=>`
    <tr class="table-row border-b last:border-0">
      ${isTech() ? `<td class="px-3 py-3"><input type="checkbox" class="eq-row-check" data-id="${e.id}" onchange="updateBulkBar()" style="cursor:pointer;"></td>` : ''}
      <td class="px-4 py-3">
        <button onclick="openEqDetail(${e.id})" style="font-weight:600;color:#141414;background:none;border:none;cursor:pointer;padding:0;text-align:left;">${esc(e.name)}</button>
      </td>
      <td class="px-4 py-3 text-gray-500 col-m-hide">${esc(e.category)}</td>
      <td class="px-4 py-3 text-gray-500 font-mono text-xs col-m-hide">${esc(e.serial_num||'—')}</td>
      <td class="px-4 py-3 text-gray-500 col-m-hide">${esc(e.location||'—')}</td>
      <td class="px-4 py-3"><span class="${sc[e.status]||'badge-gray'}">${e.status}</span></td>
      <td class="px-4 py-3">
        ${e.overdue_tasks ? `<span class="badge-red">${e.overdue_tasks} overdue</span>` :
          e.pending_tasks ? `<span class="badge-blue">${e.pending_tasks} pending</span>` :
          `<span class="badge-green">OK</span>`}
      </td>
      <td class="px-4 py-3 col-m-hide">${dueBadge(e.cal_next_due)}</td>
      <td class="px-4 py-3 text-right" style="white-space:nowrap;">
        <button onclick="openQRModal(${e.id},'${esc(e.name)}')" class="text-gray-400 hover:text-gray-700 text-xs mr-3" title="QR Code">&#9641; QR</button>
        ${isTech() ? `<button onclick="openEquipmentModal(${e.id})" class="text-gray-800 hover:underline text-xs mr-3">Edit</button>` : ''}
        ${isAdmin() ? `<button onclick="deleteEquipment(${e.id})" class="text-red-500 hover:underline text-xs">Delete</button>` : ''}
      </td>
    </tr>`).join('') || '<tr><td colspan="8" class="px-4 py-8 text-center text-gray-400">No equipment found.</td></tr>';
}

function filterEquipment(search) {
  const s = (search ?? $('eq-search').value).toLowerCase();
  const cat = $('eq-cat-filter')?.value || '';
  const fields = ['name','serial_num','model','manufacturer','location','assigned_to','status','notes','category'];
  const filtered = equipmentData.filter(e =>
    (!s || fields.some(f => (e[f]||'').toLowerCase().includes(s))) &&
    (!cat || e.category === cat)
  );
  $('eq-tbody').innerHTML = equipmentRows(filtered);
}

            </div>

function eqTaskRow(t) {
  const sc = {pending:'badge-blue',overdue:'badge-red',completed:'badge-green'};
  const isDone = t.status === 'completed';
  return `<div style="border:1px solid #e5e7eb;border-radius:0.5rem;padding:0.75rem 1rem;margin-bottom:0.5rem;background:${isDone?'#f9fafb':'#fff'};">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:0.5rem;">
      <div style="flex:1;">
        <div style="font-size:0.875rem;font-weight:600;">${esc(t.title)}</div>
        <div style="display:flex;gap:0.5rem;margin-top:0.35rem;flex-wrap:wrap;">
          <span class="${sc[t.status]||'badge-gray'}">${t.status}</span>
          ${t.task_type !== 'scheduled' ? `<span class="badge-gray">${t.task_type}</span>` : ''}
          ${t.next_due ? `<span style="font-size:0.75rem;color:#6b7280;">Due: ${fmtDate(t.next_due)}</span>` : ''}
          ${t.last_done ? `<span style="font-size:0.75rem;color:#6b7280;">Last: ${fmtDate(t.last_done)}</span>` : ''}
          ${t.interval_days ? `<span style="font-size:0.75rem;color:#059669;font-weight:600;">🔁 Every ${t.interval_days}d</span>` : ''}
          ${t.assigned_to ? `<span style="font-size:0.75rem;color:#6b7280;">→ ${esc(t.assigned_to)}</span>` : ''}
        </div>
        ${t.notes ? `<div style="font-size:0.75rem;color:#6b7280;margin-top:0.25rem;">${esc(t.notes)}</div>` : ''}
      </div>
      <div style="display:flex;gap:0.5rem;flex-shrink:0;">
        ${!isDone && isTech() ? `<button onclick="eqCompleteTask(${t.id})" style="font-size:0.72rem;background:#dcfce7;color:#15803d;border:none;border-radius:0.375rem;padding:0.25rem 0.6rem;cursor:pointer;">✓ Done</button>` : ''}
        ${isDone ? `<button onclick="openDA2404Modal(${t.id})" style="font-size:0.72rem;background:#fef9c3;color:#854d0e;border:none;border-radius:0.375rem;padding:0.25rem 0.6rem;cursor:pointer;">DA 2404</button>` : ''}
        ${isTech() ? `<button onclick="eqUpdateTaskDue(${t.id})" style="font-size:0.72rem;background:#dce8f5;color:#141414;border:none;border-radius:0.375rem;padding:0.25rem 0.6rem;cursor:pointer;">Edit</button>` : ''}
        ${isAdmin() ? `<button onclick="eqDeleteTask(${t.id})" style="font-size:0.72rem;background:#fef2f2;color:#dc2626;border:none;border-radius:0.375rem;padding:0.25rem 0.6rem;cursor:pointer;">✕</button>` : ''}
      </div>
    </div>
  </div>`;
}

function eqCalRow(c) {
  const overdue = c.next_due && c.next_due < new Date().toISOString().slice(0,10);
  return `<div style="border:1px solid #e5e7eb;border-radius:0.5rem;padding:0.75rem 1rem;margin-bottom:0.5rem;">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:0.5rem;">
      <div style="flex:1;">
        <div style="display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;">
          <span class="${c.result==='pass'?'badge-green':'badge-red'}">${c.result.toUpperCase()}</span>
          <span style="font-size:0.875rem;font-weight:600;">Calibrated ${fmtDate(c.calibrated_at)}</span>
          ${c.calibrated_by ? `<span style="font-size:0.75rem;color:#6b7280;">by ${esc(c.calibrated_by)}</span>` : ''}
        </div>
        <div style="display:flex;gap:1rem;margin-top:0.35rem;flex-wrap:wrap;">
          ${c.next_due ? `<span style="font-size:0.75rem;${overdue?'color:#dc2626;font-weight:600;':'color:#6b7280;'}">Next due: ${fmtDate(c.next_due)}${overdue?' ⚠':''}` : ''}
          ${c.certificate_num ? `<span style="font-size:0.75rem;color:#6b7280;">Cert #: ${esc(c.certificate_num)}</span>` : ''}
        </div>
        ${c.notes ? `<div style="font-size:0.75rem;color:#6b7280;margin-top:0.25rem;">${esc(c.notes)}</div>` : ''}
      </div>
      <div style="display:flex;gap:0.5rem;flex-shrink:0;">
        ${isTech() ? `<button onclick="eqUpdateCalDue(${c.id})" style="font-size:0.72rem;background:#dce8f5;color:#141414;border:none;border-radius:0.375rem;padding:0.25rem 0.6rem;cursor:pointer;">Edit</button>` : ''}
        ${isAdmin() ? `<button onclick="eqDeleteCal(${c.id})" style="font-size:0.72rem;background:#fef2f2;color:#dc2626;border:none;border-radius:0.375rem;padding:0.25rem 0.6rem;cursor:pointer;">✕</button>` : ''}
      </div>
    </div>
  </div>`;
}

async function eqSaveTask(e, eqId) {
  e.preventDefault();
  const body = Object.fromEntries(new FormData(e.target));
  body.equipment_id = eqId;
  if (body.interval_days) body.interval_days = parseInt(body.interval_days);
  try {
    await api('POST', '/api/maintenance', body);
    document.getElementById('subtask-backdrop')?.remove();
    toast('Task added.');
    await _refreshEqDetail(eqId);
  } catch(err) { toast(err.message, false); }
}

async function eqPutTask(e, taskId, eqId) {
  e.preventDefault();
  const body = Object.fromEntries(new FormData(e.target));
  body.equipment_id = eqId;
  if (body.interval_days) body.interval_days = parseInt(body.interval_days);

    await api('PUT', `/api/maintenance/${taskId}`, body);
    document.getElementById('subtask-backdrop')?.remove();
    toast('Task updated.');
    await _refreshEqDetail(eqId);

}

async function eqCompleteTask(taskId) {

  overlay.className = 'modal-backdrop';
  overlay.id = 'subtask-backdrop';

    <div class="px-6 py-4 border-b flex items-center justify-between">
      <h2 style="font-weight:600;">Mark Complete</h2>

async function eqSubmitComplete(e, taskId, eqId) {
  e.preventDefault();
  const body = Object.fromEntries(new FormData(e.target));
  try {
    await api('POST', `/api/maintenance/${taskId}/complete`, body);
    document.getElementById('subtask-backdrop')?.remove();
    toast('Task completed.');
    await _refreshEqDetail(eqId);
  } catch(err) { toast(err.message, false); }

async function eqDeleteTask(taskId) {
  if (!confirm('Delete this task?')) return;
  const eqId = window._eqDetail.id;
  await api('DELETE', `/api/maintenance/${taskId}`);
  toast('Task deleted.');
  await _refreshEqDetail(eqId);
}

function eqAttCard(a, eqId) {
  const isImg = /^image\//i.test(a.file_type || '');
  const isPdf = (a.file_type || '').includes('pdf');
  const url   = `/api/attachments/${eqId}/file/${a.id}?token=${getToken()}`;
  const thumb = isImg
    ? `<img src="${url}" alt="${esc(a.original_name)}" style="width:100%;height:90px;object-fit:cover;border-radius:0.5rem 0.5rem 0 0;">`
    : `<div style="height:90px;display:flex;align-items:center;justify-content:center;background:#f3f4f6;border-radius:0.5rem 0.5rem 0 0;">
         <svg style="width:2.5rem;height:2.5rem;color:${isPdf?'#ef4444':'#6b7280'};" fill="none" stroke="currentColor" viewBox="0 0 24 24">
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
         </svg>
       </div>`;
  const kb = a.file_size ? (a.file_size < 1048576 ? Math.round(a.file_size/1024)+'KB' : (a.file_size/1048576).toFixed(1)+'MB') : '';
  return `<div style="border:1px solid #e5e7eb;border-radius:0.5rem;overflow:hidden;font-size:0.72rem;">
    <a href="${url}" target="_blank" style="display:block;text-decoration:none;cursor:zoom-in;">${thumb}</a>
    <div style="padding:0.4rem 0.5rem;">
      <div style="color:#374151;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${esc(a.original_name)}">${esc(a.original_name)}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:0.2rem;">
        <span style="color:#9ca3af;">${kb}</span>
        <button onclick="eqDeleteAtt(${a.id},${eqId})" style="color:#ef4444;background:none;border:none;cursor:pointer;font-size:0.7rem;padding:0;">✕ remove</button>
      </div>
    </div>
  </div>`;
}

  e.preventDefault();

  await eqUploadFiles(e.dataTransfer.files, eqId);
}

async function eqUploadFiles(files, eqId) {
  if (!files || files.length === 0) return;
  const prog = $('att-upload-progress');
  const bar  = $('att-progress-bar');
  const lbl  = $('att-progress-label');
  prog.style.display = 'block';

  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    lbl.textContent = `Uploading ${i+1}/${files.length}: ${f.name}`;
    bar.style.width = `${Math.round((i/files.length)*100)}%`;
    try {
      const fd = new FormData();
      fd.append('file', f);
      const r = await fetch(`/api/attachments/${eqId}`, { method:'POST', body:fd, headers:{'Authorization':'Bearer '+(getToken()||'')} });
      if (!r.ok) { const e=await r.json().catch(()=>({})); toast(e.detail||'Upload failed', false); }
    } catch(err) { toast(err.message, false); }
  }
  bar.style.width = '100%';
  setTimeout(() => { prog.style.display = 'none'; bar.style.width='0%'; }, 600);
  toast(`${files.length} file${files.length>1?'s':''} uploaded.`);
  await _refreshEqDetail(eqId);
}

async function eqDeleteAtt(attId, eqId) {
  if (!confirm('Remove this attachment?')) return;

  toast('Attachment removed.');

}

async function _refreshEqDetail(eqId) {
  const [tasks, cals, atts, hist, eqList] = await Promise.all([
    api('GET', `/api/maintenance?equipment_id=${eqId}`),
    api('GET', `/api/calibration?equipment_id=${eqId}`),
    api('GET', `/api/attachments/${eqId}`),
    api('GET', `/api/audit/equipment/${eqId}`),
    api('GET', '/api/equipment'),
  ]);
  equipmentData = eqList;
  const eq = equipmentData.find(e=>e.id===eqId) || window._eqDetail.eq;
  const prevTab = document.querySelector('.eq-tab.active-tab')?.id?.replace('tab-','') || 'maintenance';
  window._eqDetail = { id: eqId, eq, tasks, cals, atts, hist };
  const mtBadge  = $('mt-count-badge');
  const calBadge = $('cal-count-badge');
  const attBadge = $('att-count-badge');
  if (mtBadge)  mtBadge.textContent  = tasks.filter(t=>t.status!=='completed').length || '';
  if (calBadge) calBadge.textContent = cals.length || '';
  if (attBadge) attBadge.textContent = atts.length || '';
  eqTab(prevTab);
}

function eqLocationChange(sel) {
  const newInput = document.getElementById('eq-location-new');
  const hiddenVal = document.getElementById('eq-location-val');
  if (sel.value === '__new__') {
    newInput.style.display = 'block';
    newInput.focus();
    hiddenVal.value = '';
  } else {
    newInput.style.display = 'none';
    hiddenVal.value = sel.value;
  }
}

function syncNewLocation(input) {
  document.getElementById('eq-location-val').value = input.value.trim();
}

function eqAssignedChange(sel) {
  const newInput = document.getElementById('eq-assigned-new');
  const hiddenVal = document.getElementById('eq-assigned-val');
  if (sel.value === '__new__') {
    newInput.style.display = 'block';
    newInput.focus();
    hiddenVal.value = '';
  } else {
    newInput.style.display = 'none';
    hiddenVal.value = sel.value;
  }
}

function syncNewAssigned(input) {
  document.getElementById('eq-assigned-val').value = input.value.trim();
}

async function saveEquipment(e, id) {
  e.preventDefault();
  const body = Object.fromEntries(new FormData(e.target));
  // location comes from the hidden field; drop the helper fields
  delete body.location_select;
  delete body.location_new;
  delete body.assigned_select;
  delete body.assigned_new;
  try {
    if (id) await api('PUT', `/api/equipment/${id}`, body);
    else await api('POST', '/api/equipment', body);
    closeModal();
    toast(id ? 'Equipment updated.' : 'Equipment added.');
    await refreshEquipment();
  } catch(err) { toast(err.message, false); }
}

async function deleteEquipment(id) {
  if (!confirm('Delete this equipment and all its records?')) return;
  try {
    await api('DELETE', `/api/equipment/${id}`);
    closeModal();
    toast('Deleted.');
    await refreshEquipment();
  } catch(err) { toast(err.message, false); }
}

// ─── Maintenance ──────────────────────────────────────────────────────────────
let maintenanceData = [], equipList = [];

async function maintenancePage() {
  $('page-actions').innerHTML = `
    <a href="#" onclick="event.preventDefault();window.open('/api/csv/maintenance/export?token='+getToken(),'_blank')" class="btn-secondary" style="font-size:0.8rem;text-decoration:none;">⬇ Export CSV</a>
    ${isTech() ? `<button onclick="openTaskModal()" class="btn-primary">+ Add Task</button>` : ''}`;
  [maintenanceData, equipList] = await Promise.all([
    api('GET', '/api/maintenance'),
    api('GET', '/api/equipment'),
  ]);
  renderMaintenanceTable(maintenanceData);
}

function renderMaintenanceTable(rows) {
  const sc = {pending:'badge-blue',overdue:'badge-red',completed:'badge-green'};
  const tc = {scheduled:'badge-gray',corrective:'badge-yellow',inspection:'badge-blue'};
  $('page-content').innerHTML = `
    <div class="card overflow-hidden p-0">
      <div class="px-5 py-4 border-b flex flex-wrap items-center gap-3">
        <input id="mt-search" class="input max-w-xs" placeholder="Search tasks…" oninput="filterMaintenance()">
        <select id="mt-status-filter" class="input w-36" onchange="filterMaintenance()">
          <option value="">All statuses</option>
          <option>overdue</option><option>pending</option><option>completed</option>
        </select>
        <button onclick="refreshOverdue()" class="btn-secondary text-xs">Refresh Overdue</button>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-xs text-gray-500 uppercase tracking-wide">
            <tr>
              <th class="px-4 py-3 text-left">Task</th>
              <th class="px-4 py-3 text-left col-m-hide">Equipment</th>
              <th class="px-4 py-3 text-left col-m-hide">Type</th>
              <th class="px-4 py-3 text-left">Status</th>
              <th class="px-4 py-3 text-left">Due</th>
              <th class="px-4 py-3 text-left col-m-hide">Assigned</th>
              <th class="px-4 py-3 text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="mt-tbody">
            ${maintenanceRows(rows)}
          </tbody>
        </table>
      </div>
    </div>`;
}

function maintenanceRows(rows) {
  const sc = {pending:'badge-blue',overdue:'badge-red',completed:'badge-green'};
  const tc = {scheduled:'badge-gray',corrective:'badge-yellow',inspection:'badge-blue'};
  return rows.map(t=>`
    <tr class="table-row border-b last:border-0">
      <td class="px-4 py-3 font-medium">${esc(t.title)}</td>
      <td class="px-4 py-3 text-gray-500 col-m-hide">${esc(t.equipment_name)}</td>
      <td class="px-4 py-3 col-m-hide"><span class="${tc[t.task_type]||'badge-gray'}">${t.task_type}</span></td>
      <td class="px-4 py-3"><span class="${sc[t.status]||'badge-gray'}">${t.status}</span></td>
      <td class="px-4 py-3">${dueBadge(t.next_due, t.status==='completed'?'completed':t.status)}</td>
      <td class="px-4 py-3 text-gray-500 col-m-hide">${esc(t.assigned_to||'—')}</td>
      <td class="px-4 py-3 text-right space-x-2 whitespace-nowrap">
        ${t.status!=='completed' && isTech() ?`<button onclick="completeTaskModal(${t.id})" class="text-green-600 hover:underline text-xs">Complete</button>`:''}
        ${isTech() ? `<button onclick="dashEditTask(${t.id})" class="text-gray-600 hover:underline text-xs">Edit</button>` : ''}
        <button onclick="openTaskAttachments(${t.id},'${esc(t.title)}')" class="text-blue-500 hover:underline text-xs">📎</button>
        ${isAdmin() ? `<button onclick="deleteTask(${t.id})" class="text-red-500 hover:underline text-xs">Delete</button>` : ''}
      </td>
    </tr>`).join('') || '<tr><td colspan="7" class="px-4 py-8 text-center text-gray-400">No tasks found.</td></tr>';
}

function filterMaintenance() {
  const s = $('mt-search').value.toLowerCase();
  const st = $('mt-status-filter').value;
  const filtered = maintenanceData.filter(t =>
    (!s || t.title.toLowerCase().includes(s) || t.equipment_name.toLowerCase().includes(s)) &&
    (!st || t.status === st)
  );
  $('mt-tbody').innerHTML = maintenanceRows(filtered);
}

async function refreshOverdue() {
  await api('POST', '/api/maintenance/refresh-overdue');
  [maintenanceData] = await Promise.all([api('GET', '/api/maintenance')]);
  renderMaintenanceTable(maintenanceData);
  toast('Overdue statuses refreshed.');
}

function openTaskModal() {
  const eqOptions = equipList.map(e=>`<option value="${e.id}">${esc(e.name)}</option>`).join('');
  const categories = [...new Set(equipList.map(e=>e.category).filter(Boolean))].sort();
  const catOptions = categories.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
  modal(`<div class="modal" style="max-width:42rem;">
    <div class="px-6 py-4 border-b flex items-center justify-between">
      <h2 class="font-semibold">Add Maintenance Task</h2>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
    </div>
    <div class="px-6 pt-4">
      <div style="display:flex;gap:0;border:1px solid #e5e7eb;border-radius:0.5rem;overflow:hidden;width:fit-content;">
        <button type="button" id="mt-mode-single" onclick="setTaskMode('single')"
          style="padding:0.4rem 1rem;font-size:0.8rem;font-weight:600;border:none;cursor:pointer;background:#1e3a5f;color:#fff;">Single Equipment</button>
        <button type="button" id="mt-mode-bulk" onclick="setTaskMode('bulk')"
          style="padding:0.4rem 1rem;font-size:0.8rem;font-weight:600;border:none;cursor:pointer;background:#f3f4f6;color:#374151;">Apply to Multiple</button>
      </div>
    </div>
    <form id="mt-form" class="px-6 py-4 space-y-4" onsubmit="saveTask(event)">
      <div class="grid grid-cols-2 gap-4">
        <div class="col-span-2" id="mt-single-target">
          <label class="label">Equipment *</label>
          <select class="input" name="equipment_id"><option value="">Select…</option>${eqOptions}</select>
        </div>
        <div class="col-span-2" id="mt-bulk-target" style="display:none;">
          <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:0.5rem;padding:0.75rem 1rem;margin-bottom:0.75rem;font-size:0.8rem;color:#92400e;">
            Task will be created for every <strong>active</strong> equipment matching the filters below. Leave both blank to apply to <em>all</em> active equipment.
          </div>
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="label">Category</label>
              <select class="input" name="category" onchange="updateTaskPreview()">
                <option value="">— Any category —</option>${catOptions}
              </select>
            </div>
            <div>
              <label class="label">Name contains</label>
              <input class="input" name="name_contains" placeholder="e.g. M4, Radio…" oninput="updateTaskPreview()">
            </div>
          </div>
          <div id="mt-bulk-preview" style="margin-top:0.5rem;font-size:0.8rem;color:#374151;"></div>
        </div>
        <div class="col-span-2"><label class="label">Task Title *</label><input class="input" name="title" required></div>
        <div><label class="label">Type</label>
          <select class="input" name="task_type">
            <option>scheduled</option><option>corrective</option><option>inspection</option>
          </select>
        </div>
        <div><label class="label">Status</label>
          <select class="input" name="status">
            <option>pending</option><option>overdue</option>
          </select>
        </div>
        <div><label class="label">Next Due</label><input class="input" type="date" name="next_due"></div>
        <div><label class="label">Interval (days)</label><input class="input" type="number" name="interval_days" min="1"></div>
        <div><label class="label">Assigned To</label><input class="input" name="assigned_to"></div>
        <div class="col-span-2"><label class="label">Notes</label><textarea class="input" name="notes" rows="2"></textarea></div>
      </div>
      <div class="flex justify-end gap-3 pt-2">
        <button type="button" onclick="closeModal()" class="btn-secondary">Cancel</button>
        <button type="submit" id="mt-submit-btn" class="btn-primary">Save Task</button>
      </div>
    </form>
  </div>`);
  window._taskMode = 'single';
  updateTaskPreview();
}

function setTaskMode(mode) {
  window._taskMode = mode;
  const single = document.getElementById('mt-single-target');
  const bulk   = document.getElementById('mt-bulk-target');
  const btnS   = document.getElementById('mt-mode-single');
  const btnB   = document.getElementById('mt-mode-bulk');
  const eqSel  = single?.querySelector('select');
  single.style.display = mode === 'single' ? '' : 'none';
  bulk.style.display   = mode === 'bulk'   ? '' : 'none';
  if (eqSel) eqSel.required = mode === 'single';
  btnS.style.background = mode === 'single' ? '#1e3a5f' : '#f3f4f6';
  btnS.style.color      = mode === 'single' ? '#fff'    : '#374151';
  btnB.style.background = mode === 'bulk'   ? '#1e3a5f' : '#f3f4f6';
  btnB.style.color      = mode === 'bulk'   ? '#fff'    : '#374151';
  updateTaskPreview();
}

function updateTaskPreview() {
  const preview = document.getElementById('mt-bulk-preview');
  if (!preview) return;
  const form = document.getElementById('mt-form');
  const cat  = form?.querySelector('[name="category"]')?.value?.toLowerCase() || '';
  const name = form?.querySelector('[name="name_contains"]')?.value?.toLowerCase() || '';
  const matches = equipList.filter(e =>
    (!cat  || (e.category||'').toLowerCase() === cat) &&
    (!name || (e.name||'').toLowerCase().includes(name))
  );
  const btn = document.getElementById('mt-submit-btn');
  if (window._taskMode !== 'bulk') { if (btn) btn.textContent = 'Save Task'; return; }
  preview.innerHTML = matches.length
    ? `<span style="color:#15803d;font-weight:600;">✓ ${matches.length} equipment matched</span>: ${matches.slice(0,5).map(e=>esc(e.name)).join(', ')}${matches.length>5?' …':''}`
    : `<span style="color:#dc2626;">No equipment matched — check your filters.</span>`;
  if (btn) btn.textContent = matches.length ? `Create Tasks for ${matches.length}` : 'No Matches';
}

async function saveTask(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = Object.fromEntries(fd);
  if (body.interval_days) body.interval_days = parseInt(body.interval_days) || null;
  if (window._taskMode === 'bulk') {
    if (!body.category && !body.name_contains) {
      if (!confirm('No filters set — this will create a task for ALL active equipment. Continue?')) return;
    }
    const payload = { title: body.title, description: body.description||null,
      task_type: body.task_type, interval_days: body.interval_days||null,
      next_due: body.next_due||null, status: body.status,
      assigned_to: body.assigned_to||null, notes: body.notes||null,
      category: body.category||null, name_contains: body.name_contains||null };
    try {
      const res = await api('POST', '/api/maintenance/bulk', payload);
      closeModal();
      toast(`Created ${res.created} task${res.created!==1?'s':''}.`);
      maintenanceData = await api('GET', '/api/maintenance');
      renderMaintenanceTable(maintenanceData);
    } catch(err) { toast(err.message, false); }
  } else {
    body.equipment_id = parseInt(body.equipment_id);
    try {
      await api('POST', '/api/maintenance', body);
      closeModal();
      toast('Task added.');
      maintenanceData = await api('GET', '/api/maintenance');
      renderMaintenanceTable(maintenanceData);
    } catch(err) { toast(err.message, false); }
  }
}

let _completePartsRows = [];
let _inventoryForComplete = [];

async function completeTaskModal(id) {
  _completePartsRows = [];
  _inventoryForComplete = await api('GET', '/api/inventory').catch(() => []);
  const tasks = maintenanceData || [];
  const task = tasks.find(t => t.id === id) || {};
  let recurringHint = '';
  if (task.interval_days) {
    const nxt = new Date();
    nxt.setDate(nxt.getDate() + task.interval_days);
    recurringHint = `<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:0.375rem;padding:0.6rem 0.9rem;font-size:0.8rem;color:#15803d;">
      🔁 Recurring task — next will auto-schedule for <strong>${nxt.toISOString().slice(0,10)}</strong> (${task.interval_days}d interval). Override below if needed.
    </div>`;
  }
  modal(`<div class="modal" style="max-width:36rem;">
    <div class="px-6 py-4 border-b flex items-center justify-between">
      <h2 class="font-semibold">Mark Task Complete</h2>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
    </div>
    <form id="complete-form" class="px-6 py-4 space-y-4" onsubmit="submitComplete(event,${id})">
      ${recurringHint}
      <div><label class="label">Completed By</label><input class="input" name="completed_by"></div>
      <div><label class="label">${task.interval_days ? 'Override Next Due (optional)' : 'Next Due'}</label><input class="input" type="date" name="next_due"></div>
      <div><label class="label">Notes</label><textarea class="input" name="notes" rows="2"></textarea></div>

      <div style="border-top:1px solid #f3f4f6;padding-top:1rem;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.6rem;">
          <div style="font-size:0.8rem;font-weight:700;color:#374151;">Parts Used (optional)</div>
          <button type="button" onclick="addCompletePartRow()" class="btn-secondary" style="font-size:0.75rem;padding:0.25rem 0.6rem;">+ Add Part</button>
        </div>
        <div id="complete-parts-list" style="display:flex;flex-direction:column;gap:0.5rem;"></div>
      </div>

      <div class="flex justify-end gap-3 pt-2">
        <button type="button" onclick="closeModal()" class="btn-secondary">Cancel</button>
        <button type="submit" class="btn-primary">Mark Complete</button>
      </div>
    </form>
  </div>`);
}

function addCompletePartRow() {
  const idx = _completePartsRows.length;
  _completePartsRows.push({ item_id: '', quantity_used: 1 });
  const optionsHtml = _inventoryForComplete.map(i =>
    `<option value="${i.id}">${esc(i.name)}${i.part_number ? ' ('+esc(i.part_number)+')' : ''} — ${i.quantity} ${esc(i.unit)} on hand</option>`
  ).join('');
  const row = document.createElement('div');
  row.id = `cpart-${idx}`;
  row.style.cssText = 'display:flex;gap:0.5rem;align-items:center;';
  row.innerHTML = `
    <select class="input" style="flex:2;" onchange="_completePartsRows[${idx}].item_id=parseInt(this.value)">
      <option value="">— Select part —</option>${optionsHtml}
    </select>
    <input type="number" class="input" style="width:5rem;" min="0.01" step="0.01" value="1"
           placeholder="Qty" oninput="_completePartsRows[${idx}].quantity_used=parseFloat(this.value)||1">
    <button type="button" onclick="document.getElementById('cpart-${idx}').remove();_completePartsRows[${idx}]=null;"
            style="color:#dc2626;background:none;border:none;cursor:pointer;font-size:1.1rem;padding:0 0.25rem;">✕</button>`;
  document.getElementById('complete-parts-list').appendChild(row);
}

async function submitComplete(e, id) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = Object.fromEntries(fd);
  const parts = _completePartsRows.filter(p => p && p.item_id);
  if (parts.length) body.parts_used = parts;
  try {
    await api('POST', `/api/maintenance/${id}/complete`, body);
    closeModal();
    toast('Task completed.');
    maintenanceData = await api('GET', '/api/maintenance');
    renderMaintenanceTable(maintenanceData);
  } catch(err) { toast(err.message, false); }
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  await api('DELETE', `/api/maintenance/${id}`);
  toast('Deleted.');
  maintenanceData = await api('GET', '/api/maintenance');
  renderMaintenanceTable(maintenanceData);
}


// ── Task Attachments ──────────────────────────────────────────────────────────
async function openTaskAttachments(taskId, taskTitle) {
  let atts = await api('GET', `/api/task-attachments/${taskId}`).catch(() => []);
  renderTaskAttModal(taskId, taskTitle, atts);
}

function renderTaskAttModal(taskId, taskTitle, atts) {
  const isImg = t => t && t.startsWith('image/');
  const fmtSize = b => b < 1024 ? b+'B' : b < 1048576 ? (b/1024).toFixed(0)+'KB' : (b/1048576).toFixed(1)+'MB';
  const fileUrl = a => `/api/task-attachments/${taskId}/file/${a.id}?token=${getToken()}`;

  const attList = atts.length ? atts.map(a => `
    <div style="display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0;border-bottom:1px solid #f3f4f6;">
      ${isImg(a.file_type)
        ? `<img src="${fileUrl(a)}" style="width:3rem;height:3rem;object-fit:cover;border-radius:0.375rem;flex-shrink:0;" loading="lazy">`
        : `<div style="width:3rem;height:3rem;background:#f3f4f6;border-radius:0.375rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.25rem;">📄</div>`}
      <div style="flex:1;min-width:0;">
        <a href="${fileUrl(a)}" target="_blank" style="font-size:0.8rem;font-weight:600;color:#1e3a5f;text-decoration:none;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(a.original_name)}</a>
        <div style="font-size:0.72rem;color:#9ca3af;">${fmtSize(a.file_size||0)} · ${a.created_at?.slice(0,10)||''}</div>
      </div>
      ${isTech() ? `<button onclick="deleteTaskAtt(${taskId},'${esc(taskTitle)}',${a.id})" style="color:#ef4444;background:none;border:none;cursor:pointer;font-size:1rem;padding:0.25rem;">✕</button>` : ''}
    </div>`).join('')
    : `<p style="font-size:0.875rem;color:#9ca3af;text-align:center;padding:1.5rem 0;">No attachments yet.</p>`;

  const uploadSection = isTech() ? `
    <div id="task-att-drop" style="border:2px dashed #d1d5db;border-radius:0.5rem;padding:1.25rem;text-align:center;cursor:pointer;margin-top:1rem;"
         onclick="document.getElementById('task-att-input').click()"
         ondragover="event.preventDefault();this.style.borderColor='#1e3a5f'"
         ondragleave="this.style.borderColor='#d1d5db'"
         ondrop="event.preventDefault();this.style.borderColor='#d1d5db';uploadTaskAtts(${taskId},'${esc(taskTitle)}',event.dataTransfer.files)">
      <div style="font-size:0.85rem;color:#6b7280;">Drop files here or <span style="color:#1e3a5f;font-weight:600;">browse</span></div>
      <div style="font-size:0.72rem;color:#9ca3af;margin-top:0.25rem;">Images, PDF, Office docs · max 50 MB each</div>
    </div>
    <input id="task-att-input" type="file" multiple style="display:none"
           accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.csv,.txt,.zip"
           onchange="uploadTaskAtts(${taskId},'${esc(taskTitle)}',this.files)">
    <div id="task-att-progress" style="display:none;margin-top:0.75rem;">
      <div style="height:4px;background:#e5e7eb;border-radius:2px;overflow:hidden;">
        <div id="task-att-bar" style="height:100%;background:#1e3a5f;width:0%;transition:width 0.3s;"></div>
      </div>
      <div id="task-att-status" style="font-size:0.75rem;color:#6b7280;margin-top:0.35rem;text-align:center;"></div>
    </div>` : '';

  modal(`<div class="modal" style="max-width:34rem;">
    <div class="px-6 py-4 border-b flex items-center justify-between">
      <div>
        <h2 class="font-semibold">Attachments</h2>
        <div style="font-size:0.75rem;color:#6b7280;margin-top:1px;">${esc(taskTitle)}</div>
      </div>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
    </div>
    <div class="px-6 py-4">
      <div id="task-att-list">${attList}</div>
      ${uploadSection}
    </div>
  </div>`);
}

async function uploadTaskAtts(taskId, taskTitle, files) {
  if (!files || !files.length) return;
  const prog = document.getElementById('task-att-progress');
  const bar  = document.getElementById('task-att-bar');
  const stat = document.getElementById('task-att-status');
  if (prog) prog.style.display = '';
  let done = 0;
  for (const file of Array.from(files)) {
    if (stat) stat.textContent = `Uploading ${file.name}…`;
    const fd = new FormData();
    fd.append('file', file);
    await fetch(`/api/task-attachments/${taskId}`, {
      method: 'POST', body: fd,
      headers: { 'Authorization': 'Bearer ' + (getToken() || '') }
    }).catch(() => {});
    done++;
    if (bar) bar.style.width = `${Math.round(done / files.length * 100)}%`;
  }
  if (prog) prog.style.display = 'none';
  toast(`${files.length} file${files.length > 1 ? 's' : ''} uploaded.`);
  const atts = await api('GET', `/api/task-attachments/${taskId}`).catch(() => []);
  document.getElementById('task-att-list').innerHTML = atts.length
    ? atts.map(a => {
        const isImg = a.file_type?.startsWith('image/');
        const fmtSize = b => b < 1024 ? b+'B' : b < 1048576 ? (b/1024).toFixed(0)+'KB' : (b/1048576).toFixed(1)+'MB';
        const fileUrl = `/api/task-attachments/${taskId}/file/${a.id}?token=${getToken()}`;
        return `<div style="display:flex;align-items:center;gap:0.75rem;padding:0.6rem 0;border-bottom:1px solid #f3f4f6;">
          ${isImg ? `<img src="${fileUrl}" style="width:3rem;height:3rem;object-fit:cover;border-radius:0.375rem;flex-shrink:0;" loading="lazy">`
                  : `<div style="width:3rem;height:3rem;background:#f3f4f6;border-radius:0.375rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.25rem;">📄</div>`}
          <div style="flex:1;min-width:0;">
            <a href="${fileUrl}" target="_blank" style="font-size:0.8rem;font-weight:600;color:#1e3a5f;text-decoration:none;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(a.original_name)}</a>
            <div style="font-size:0.72rem;color:#9ca3af;">${fmtSize(a.file_size||0)} · ${a.created_at?.slice(0,10)||''}</div>
          </div>
          ${isTech() ? `<button onclick="deleteTaskAtt(${taskId},'${esc(taskTitle)}',${a.id})" style="color:#ef4444;background:none;border:none;cursor:pointer;font-size:1rem;padding:0.25rem;">✕</button>` : ''}
        </div>`;
      }).join('')
    : `<p style="font-size:0.875rem;color:#9ca3af;text-align:center;padding:1.5rem 0;">No attachments yet.</p>`;
  const inp = document.getElementById('task-att-input');
  if (inp) inp.value = '';
}

async function deleteTaskAtt(taskId, taskTitle, attId) {
  if (!confirm('Remove this attachment?')) return;
  await api('DELETE', `/api/task-attachments/${taskId}/${attId}`);
  const atts = await api('GET', `/api/task-attachments/${taskId}`).catch(() => []);
  renderTaskAttModal(taskId, taskTitle, atts);
}

// ─── Calibration ──────────────────────────────────────────────────────────────
let calData = [];
let calSelected = new Set();
async function calibrationPage() {
  $('page-actions').innerHTML = `
    <a href="#" onclick="event.preventDefault();window.open('/api/csv/calibration/export?token='+getToken(),'_blank')" class="btn-secondary" style="font-size:0.8rem;text-decoration:none;">⬇ Export CSV</a>
    <button onclick="openCsvImport('calibration')" class="btn-secondary" style="font-size:0.8rem;">⬆ Import CSV</button>

  [calData, equipList] = await Promise.all([
    api('GET', '/api/calibration'),
    api('GET', '/api/equipment'),
  ]);
  calSelected.clear();
  renderCalTable(calData);
}

function renderCalTable(rows) {
  const bulkBar = isTech() ? `
    <div id="cal-bulk-bar" style="display:none;background:#1e3a5f;color:#fff;padding:0.6rem 1.25rem;display:flex;align-items:center;gap:1rem;font-size:0.85rem;">
      <span id="cal-bulk-count">0 selected</span>
      <button onclick="openCalBulkEdit()" style="background:#fff;color:#1e3a5f;border:none;border-radius:0.375rem;padding:0.3rem 0.8rem;font-size:0.8rem;font-weight:600;cursor:pointer;">✏️ Bulk Edit</button>
      <button onclick="calClearSelection()" style="background:transparent;color:rgba(255,255,255,.7);border:none;cursor:pointer;font-size:0.8rem;">✕ Clear</button>
    </div>` : '';
  $('page-content').innerHTML = `
    <div class="card overflow-hidden p-0">
      ${bulkBar}
      <div class="px-5 py-4 border-b flex items-center gap-3">
        <input id="cal-search" class="input max-w-xs" placeholder="Search…" oninput="filterCal()">
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-xs text-gray-500 uppercase tracking-wide">
            <tr>
              ${isTech() ? `<th class="px-4 py-3"><input type="checkbox" id="cal-check-all" onchange="calToggleAll(this.checked)" style="cursor:pointer;"></th>` : ''}
              <th class="px-4 py-3 text-left">Equipment</th>
              <th class="px-4 py-3 text-left">Calibrated</th>
              <th class="px-4 py-3 text-left col-m-hide">By</th>
              <th class="px-4 py-3 text-left col-m-hide">Cert #</th>
              <th class="px-4 py-3 text-left">Result</th>
              <th class="px-4 py-3 text-left">Next Due</th>
              <th class="px-4 py-3 text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="cal-tbody">${calRows(rows)}</tbody>
        </table>
      </div>
    </div>`;
  updateCalBulkBar();
}

function calRows(rows) {
  return rows.map(c=>`
    <tr class="table-row border-b last:border-0">
      ${isTech() ? `<td class="px-4 py-3"><input type="checkbox" class="cal-row-check" data-id="${c.id}" ${calSelected.has(c.id)?'checked':''} onchange="calToggleRow(${c.id},this.checked)" style="cursor:pointer;"></td>` : ''}
      <td class="px-4 py-3 font-medium">${esc(c.equipment_name)}</td>
      <td class="px-4 py-3 text-gray-500">${fmtDate(c.calibrated_at)}</td>
      <td class="px-4 py-3 text-gray-500 col-m-hide">${esc(c.calibrated_by||'—')}</td>
      <td class="px-4 py-3 font-mono text-xs col-m-hide">${esc(c.certificate_num||'—')}</td>
      <td class="px-4 py-3"><span class="${c.result==='pass'?'badge-green':'badge-red'}">${c.result.toUpperCase()}</span></td>
      <td class="px-4 py-3">${dueBadge(c.next_due, c.result==='fail'?'fail':undefined)}</td>
      <td class="px-4 py-3 text-right">
        <button onclick="deleteCal(${c.id})" class="text-red-500 hover:underline text-xs">Delete</button>
      </td>
    </tr>`).join('') || `<tr><td colspan="${isTech()?8:7}" class="px-4 py-8 text-center text-gray-400">No records found.</td></tr>`;
}

function calToggleRow(id, checked) {
  checked ? calSelected.add(id) : calSelected.delete(id);
  updateCalBulkBar();
}

function calToggleAll(checked) {
  document.querySelectorAll('.cal-row-check').forEach(cb => {
    const id = parseInt(cb.dataset.id);
    cb.checked = checked;
    checked ? calSelected.add(id) : calSelected.delete(id);
  });
  updateCalBulkBar();
}

function calClearSelection() {
  calSelected.clear();
  document.querySelectorAll('.cal-row-check').forEach(cb => cb.checked = false);
  const ca = document.getElementById('cal-check-all');
  if (ca) ca.checked = false;
  updateCalBulkBar();
}

function updateCalBulkBar() {
  const bar = document.getElementById('cal-bulk-bar');
  if (!bar) return;
  const n = calSelected.size;
  bar.style.display = n > 0 ? 'flex' : 'none';
  const cnt = document.getElementById('cal-bulk-count');
  if (cnt) cnt.textContent = `${n} record${n!==1?'s':''} selected`;
}

function openCalBulkEdit() {
  const ids = [...calSelected];
  if (!ids.length) return;
  modal(`<div class="modal" style="max-width:34rem;">
    <div class="px-6 py-4 border-b flex items-center justify-between">
      <h2 class="font-semibold">Bulk Edit — ${ids.length} Calibration Record${ids.length!==1?'s':''}</h2>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
    </div>
    <form id="cal-bulk-form" class="px-6 py-4 space-y-4" onsubmit="submitCalBulkEdit(event)">
      <p style="font-size:0.8rem;color:#6b7280;">Only filled fields will be applied. Leave blank to keep existing values.</p>
      <div class="grid grid-cols-2 gap-4">
        <div><label class="label">Calibrated At</label><input class="input" type="date" name="calibrated_at"></div>
        <div><label class="label">Next Due</label><input class="input" type="date" name="next_due"></div>
        <div><label class="label">Calibrated By</label><input class="input" name="calibrated_by" placeholder="Leave blank to keep"></div>
        <div><label class="label">Result</label>
          <select class="input" name="result">
            <option value="">— keep existing —</option>
            <option value="pass">Pass</option>
            <option value="fail">Fail</option>
          </select>
        </div>
        <div class="col-span-2"><label class="label">Notes (appends / overwrites)</label><textarea class="input" name="notes" rows="2" placeholder="Leave blank to keep"></textarea></div>
      </div>
      <div class="flex justify-end gap-3 pt-2">
        <button type="button" onclick="closeModal()" class="btn-secondary">Cancel</button>
        <button type="submit" class="btn-primary">Apply to ${ids.length} Record${ids.length!==1?'s':''}</button>
      </div>
    </form>
  </div>`);
}

async function submitCalBulkEdit(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = { ids: [...calSelected] };
  if (fd.get('calibrated_at')) body.calibrated_at = fd.get('calibrated_at');
  if (fd.get('next_due'))      body.next_due      = fd.get('next_due');
  if (fd.get('calibrated_by')) body.calibrated_by = fd.get('calibrated_by');
  if (fd.get('result'))        body.result        = fd.get('result');
  if (fd.get('notes'))         body.notes         = fd.get('notes');
  try {
    const res = await api('PATCH', '/api/calibration/bulk', body);
    closeModal();
    calSelected.clear();
    toast(`Updated ${res.updated} record${res.updated!==1?'s':''}.`);
    calData = await api('GET', '/api/calibration');
    renderCalTable(calData);
  } catch(err) { toast(err.message, false); }
}

function filterCal() {
  const s = $('cal-search').value.toLowerCase();
  $('cal-tbody').innerHTML = calRows(calData.filter(c=>
    c.equipment_name.toLowerCase().includes(s) || (c.certificate_num||'').toLowerCase().includes(s)
  ));
}

function openCalModal() {
  const eqOptions = equipList.map(e=>`<option value="${e.id}">${esc(e.name)}</option>`).join('');
  modal(`<div class="modal">
    <div class="px-6 py-4 border-b flex items-center justify-between">
      <h2 class="font-semibold">Log Calibration</h2>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
    </div>
    <form id="cal-form" class="px-6 py-4 space-y-4" onsubmit="saveCal(event)">
      <div class="grid grid-cols-2 gap-4">
        <div class="col-span-2">
          <label class="label">Equipment *</label>
          <select class="input" name="equipment_id" required><option value="">Select…</option>${eqOptions}</select>
        </div>
        <div><label class="label">Calibrated At *</label><input class="input" type="date" name="calibrated_at" required></div>
        <div><label class="label">Next Due</label><input class="input" type="date" name="next_due"></div>
        <div><label class="label">Calibrated By</label><input class="input" name="calibrated_by"></div>
        <div><label class="label">Certificate #</label><input class="input" name="certificate_num"></div>
        <div><label class="label">Result</label>
          <select class="input" name="result">
            <option value="pass">Pass</option><option value="fail">Fail</option>
          </select>
        </div>
        <div class="col-span-2"><label class="label">Notes</label><textarea class="input" name="notes" rows="2"></textarea></div>
      </div>
      <div class="flex justify-end gap-3 pt-2">
        <button type="button" onclick="closeModal()" class="btn-secondary">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </div>`);
}

async function saveCal(e) {
  e.preventDefault();
  const body = Object.fromEntries(new FormData(e.target));
  body.equipment_id = parseInt(body.equipment_id);
  try {
    await api('POST', '/api/calibration', body);
    closeModal();
    toast('Calibration logged.');
    calData = await api('GET', '/api/calibration');
    renderCalTable(calData);
  } catch(err) { toast(err.message, false); }

async function deleteCal(id) {
  if (!confirm('Delete this calibration record?')) return;
  await api('DELETE', `/api/calibration/${id}`);
  toast('Deleted.');

}

  document.getElementById('inv-tab-stock').style.color               = tab==='stock'   ? '#1e3a5f' : '#6b7280';

      <td class="px-4 py-3">${low?'<span class="badge-yellow">Low</span>':'<span class="badge-green">OK</span>'}</td>

  }).join('') || '<tr><td colspan="7" class="px-4 py-8 text-center text-gray-400">No items found.</td></tr>';
}

function filterInventory() {
  const s = $('inv-search').value.toLowerCase();
  const low = $('inv-low-filter').checked;
  const filtered = inventoryData.filter(i =>
    (!s || i.name.toLowerCase().includes(s) || (i.part_number||'').toLowerCase().includes(s) || (i.location||'').toLowerCase().includes(s)) &&

  $('inv-tbody').innerHTML = inventoryRows(filtered);
}
