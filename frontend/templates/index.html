        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </div>`);
}

async function saveItem(e, id) {
  e.preventDefault();
  const body = Object.fromEntries(new FormData(e.target));
  if (body.quantity) body.quantity = parseInt(body.quantity);
  if (body.min_stock) body.min_stock = parseInt(body.min_stock);
  if (body.unit_cost) body.unit_cost = parseFloat(body.unit_cost);
  try {
    if (id) await api('PUT', `/api/inventory/${id}`, body);
    else await api('POST', '/api/inventory', body);
    closeModal();
    toast(id ? 'Item updated.' : 'Item added.');
    inventoryData = await api('GET', '/api/inventory');
    renderInventoryTable(inventoryData);
  } catch(err) { toast(err.message, false); }
}

function adjustModal(id, name) {
  modal(`<div class="modal">
    <div class="px-6 py-4 border-b flex items-center justify-between">
      <h2 class="font-semibold">Adjust Stock — ${esc(name)}</h2>
      <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-xl">&times;</button>
    </div>
    <form id="adj-form" class="px-6 py-4 space-y-4" onsubmit="submitAdjust(event,${id})">
      <div class="grid grid-cols-2 gap-4">
        <div><label class="label">Action</label>
          <select class="input" name="action">
            <option value="add">Add</option>
            <option value="remove">Remove</option>
            <option value="set">Set Exact</option>
          </select>
        </div>
        <div><label class="label">Quantity *</label><input class="input" type="number" name="quantity" min="0" required></div>
        <div><label class="label">Reference</label><input class="input" name="reference" placeholder="Work order, PO #…"></div>
        <div><label class="label">Performed By</label><input class="input" name="performed_by"></div>
      </div>
      <div class="flex justify-end gap-3 pt-2">
        <button type="button" onclick="closeModal()" class="btn-secondary">Cancel</button>
        <button type="submit" class="btn-primary">Apply</button>
      </div>
    </form>
  </div>`);
}

async function submitAdjust(e, id) {
  e.preventDefault();
  const body = Object.fromEntries(new FormData(e.target));
  body.quantity = parseInt(body.quantity);
  try {
    const res = await api('POST', `/api/inventory/${id}/adjust`, body);
    closeModal();
    toast(`Stock updated. New quantity: ${res.quantity}`);
    inventoryData = await api('GET', '/api/inventory');
    renderInventoryTable(inventoryData);
  } catch(err) { toast(err.message, false); }
}

async function deleteItem(id) {
  if (!confirm('Delete this item?')) return;
  await api('DELETE', `/api/inventory/${id}`);
  toast('Deleted.');
  inventoryData = await api('GET', '/api/inventory');
  renderInventoryTable(inventoryData);
}


// ─── PMCS ─────────────────────────────────────────────────────────────────────

let pmcsTemplateCache = [];
async function pmcsPage() {
  const templates = await api('GET', '/api/pmcs/templates');
  pmcsTemplateCache = templates;
  $('page-actions').innerHTML = `<button onclick="openPmcsTemplateModal()" class="btn-primary">+ New Checklist</button>`;
  $('page-content').innerHTML = templates.length === 0
    ? `<div class="card" style="text-align:center;padding:3rem;color:#9ca3af;">
        <div style="font-size:2.5rem;margin-bottom:0.75rem;">📋</div>
        <div style="font-weight:600;margin-bottom:0.4rem;">No PMCS checklists yet</div>
        <div style="font-size:0.875rem;">Create a checklist, add check items, then scan the QR code to run an inspection.</div>
       </div>`
    : `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1rem;">
        ${templates.map(pmcsCard).join('')}
       </div>`;
}

function pmcsCard(t) {
  const eqList = (t.linked_equipment||[]).map(e=>`<span style="font-size:0.72rem;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:0.3rem;padding:1px 7px;">${esc(e.name)}</span>`).join('');
  return `<div class="card" style="display:flex;flex-direction:column;gap:0.75rem;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem;">
      <div style="flex:1;">
        <div style="font-weight:700;font-size:1rem;">${esc(t.title)}</div>
        ${t.description ? `<div style="font-size:0.8rem;color:#6b7280;margin-top:0.25rem;">${esc(t.description)}</div>` : ''}
        ${eqList ? `<div style="display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.35rem;">${eqList}</div>` : ''}
      </div>
      <div style="display:flex;gap:0.4rem;flex-shrink:0;">
        <span style="font-size:0.72rem;background:#dce8f5;color:#141414;border-radius:9999px;padding:2px 10px;font-weight:600;">${t.item_count} items</span>
        <span style="font-size:0.72rem;background:#dcfce7;color:#15803d;border-radius:9999px;padding:2px 10px;font-weight:600;">${t.session_count} runs</span>
      </div>
    </div>
    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
      <button onclick="openPmcsTemplateModal(pmcsTemplateCache.find(x=>x.id===${t.id}))" class="btn-secondary" style="font-size:0.78rem;padding:0.35rem 0.8rem;">✎ Rename</button>
      <button onclick="openPmcsItems(${t.id})" class="btn-primary" style="font-size:0.78rem;padding:0.35rem 0.8rem;">✎ Edit Items</button>
      <button onclick="openPmcsQR(${t.id},'${esc(t.title)}')" class="btn-secondary" style="font-size:0.78rem;padding:0.35rem 0.8rem;">&#9641; QR Code</button>
      <a href="/pmcs/${t.id}" target="_blank" class="btn-secondary" style="font-size:0.78rem;padding:0.35rem 0.8rem;text-decoration:none;">▶ Run</a>
      <button onclick="openPmcsArchive(${t.id},'${esc(t.title)}')" class="btn-secondary" style="font-size:0.78rem;padding:0.35rem 0.8rem;">🗂 Archive</button>
      <button onclick="openCsvImport('pmcs-items',${t.id})" class="btn-secondary" style="font-size:0.78rem;padding:0.35rem 0.8rem;">⬆ Import Items</button>
      <a href="#" onclick="event.preventDefault();window.open('/api/csv/pmcs/${t.id}/items/export?token='+getToken(),'_blank')" class="btn-secondary" style="font-size:0.78rem;padding:0.35rem 0.8rem;text-decoration:none;">⬇ Export Items</a>
      <button onclick="duplicatePmcsTemplate(${t.id},'${esc(t.title)}')" class="btn-secondary" style="font-size:0.78rem;padding:0.35rem 0.8rem;">⧉ Duplicate</button>
      <button onclick="deletePmcsTemplate(${t.id})" style="font-size:0.78rem;padding:0.35rem 0.8rem;background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;border-radius:0.375rem;cursor:pointer;">✕</button>
    </div>
  </div>`;
}

// ── New/Edit template modal ───────────────────────────────────────────────────
function openPmcsTemplateModal(t) {
  t = t || {};
  modal(`<div class="modal" style="max-width:480px;">
    <div class="px-6 py-4 border-b flex items-center justify-between">
      <h2 style="font-weight:700;">${t.id ? 'Edit' : 'New'} PMCS Checklist</h2>
      <button onclick="closeModal()" style="color:#9ca3af;font-size:1.5rem;background:none;border:none;cursor:pointer;">&times;</button>
    </div>
    <form class="px-6 py-4" style="display:grid;gap:0.9rem;" onsubmit="savePmcsTemplate(event,${t.id||'null'})">
      <div><label class="label">Title *</label>
        <input class="input" name="title" required value="${esc(t.title||'')}" placeholder="e.g. M4 Before Operations PMCS">
      </div>
      <div><label class="label">Description</label>
        <input class="input" name="description" value="${esc(t.description||'')}" placeholder="Optional notes about this checklist">
      </div>
      <div style="display:flex;justify-content:flex-end;gap:0.75rem;padding-top:0.25rem;">
        <button type="button" onclick="closeModal()" class="btn-secondary">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </div>`);
}

async function savePmcsTemplate(e, id) {
  e.preventDefault();
  const body = Object.fromEntries(new FormData(e.target));
  if (id) await api('PUT', `/api/pmcs/templates/${id}`, body);
  else    await api('POST', '/api/pmcs/templates', body);
  closeModal();
  toast(id ? 'Checklist updated.' : 'Checklist created.');
  pmcsPage();
}

async function deletePmcsTemplate(id) {
  if (!confirm('Delete this checklist and all its sessions?')) return;
  await api('DELETE', `/api/pmcs/templates/${id}`);
  toast('Checklist deleted.');
  pmcsPage();
}

async function duplicatePmcsTemplate(id, title) {
  try {
    const res = await api('POST', `/api/pmcs/templates/${id}/duplicate`);
    toast(`Duplicated "${title}" — opening copy…`);
    await pmcsPage();
    openPmcsItems(res.id);
  } catch(err) { toast(err.message, false); }
}

// ── QR modal (reuse same pattern as equipment) ────────────────────────────────
function openPmcsQR(tmplId, title) {
  const img = `/api/qr/pmcs/${tmplId}`;
  const overlay = document.createElement('div');
  overlay.className = 'modal-backdrop';
  overlay.id = 'subtask-backdrop';
  overlay.innerHTML = `<div class="modal" style="max-width:340px;text-align:center;">
    <div class="px-6 py-4 border-b flex items-center justify-between">
      <h3 style="font-size:1rem;font-weight:700;">PMCS QR Code</h3>
      <button onclick="document.getElementById('subtask-backdrop').remove()" style="background:none;border:none;font-size:1.2rem;cursor:pointer;color:#6b7280;">✕</button>
    </div>
    <div class="px-6 py-5" style="display:flex;flex-direction:column;align-items:center;gap:0.75rem;">
      <img src="${img}" style="width:200px;height:200px;border:1px solid #e5e7eb;border-radius:0.5rem;" alt="QR">
      <div style="font-size:0.8rem;font-weight:600;color:#374151;">${esc(title)}</div>
      <div style="font-size:0.72rem;color:#9ca3af;">Scan to open the operator checklist</div>
      <div style="display:flex;gap:0.75rem;margin-top:0.25rem;">
        <a href="${img}" download="PMCS_QR_${tmplId}.png" class="btn-secondary" style="font-size:0.78rem;padding:0.35rem 0.8rem;text-decoration:none;">⬇ Download</a>
        <button onclick="(()=>{const w=window.open('','_blank');w.document.write('<html><head><title>PMCS QR</title><style>body{text-align:center;padding:2rem;font-family:sans-serif}img{width:220px}h2{margin:1rem 0 .25rem}@media print{button{display:none}}</style></head><body><img src=/api/qr/pmcs/${tmplId}><h2>${esc(title)}</h2><p>Scan to run PMCS inspection</p><br><button onclick=window.print()>Print</button></body></html>');w.document.close();})()" class="btn-primary" style="font-size:0.78rem;padding:0.35rem 0.8rem;">🖨 Print</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
}

// ── Item editor (2-panel: equipment list + items per equipment) ───────────────
let _pmcsEditorState = { tmplId: null, selectedEqId: null, tmpl: null, allEquip: [] };

async function openPmcsItems(tmplId) {
  _pmcsEditorState.allEquip = await api('GET', '/api/equipment');
  await _reloadPmcsEditor(tmplId, null);
}

async function _reloadPmcsEditor(tmplId, selectedEqId) {
  const tmpl = await api('GET', `/api/pmcs/templates/${tmplId}`);
  _pmcsEditorState = { tmplId, selectedEqId, tmpl, allEquip: _pmcsEditorState.allEquip };

  const linked = tmpl.linked_equipment || [];
  // If no selection default to first linked equipment
  if (!selectedEqId && linked.length > 0) selectedEqId = linked[0].id;
  _pmcsEditorState.selectedEqId = selectedEqId;

  const selectedEq = linked.find(e => e.id === selectedEqId);
  const eqItems = selectedEqId
    ? tmpl.items.filter(i => i.equipment_id === selectedEqId)
    : [];

  // Equipment not yet added
  const linkedIds = new Set(linked.map(e => e.id));
  const available = _pmcsEditorState.allEquip.filter(e => !linkedIds.has(e.id));

  const INTERVALS = ['B','D','A','W','M'];
  const INT_LABELS = {B:'Before',D:'During',A:'After',W:'Weekly',M:'Monthly'};

  const eqPanel = `
    <div style="width:210px;flex-shrink:0;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;">
      <div style="padding:0.75rem 1rem;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;border-bottom:1px solid #f3f4f6;">Equipment</div>
      <div style="flex:1;overflow-y:auto;" id="pmcs-eq-list">
        ${linked.length === 0
          ? '<p style="font-size:0.78rem;color:#9ca3af;padding:1rem;text-align:center;">No equipment yet</p>'
          : linked.map((e,ei) => `
            <div onclick="pmcsSelectEq(${e.id})" style="display:flex;align-items:center;gap:0.25rem;padding:0.45rem 0.5rem 0.45rem 0.75rem;cursor:pointer;border-bottom:1px solid #f9fafb;${e.id===selectedEqId?'background:#dce8f5;font-weight:600;':''}">
              <div style="flex:1;min-width:0;">
                <div style="font-size:0.82rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(e.name)}</div>
                <div style="font-size:0.68rem;color:#9ca3af;">${(tmpl.items.filter(i=>i.equipment_id===e.id).length)} items</div>
              </div>
              <div style="display:flex;flex-direction:column;gap:1px;flex-shrink:0;" onclick="event.stopPropagation()">
                <button onclick="movePmcsEq(${tmplId},${ei},-1)" style="font-size:0.6rem;line-height:1;background:${ei===0?'#f3f4f6':'#e5e7eb'};border:none;border-radius:2px;padding:1px 4px;cursor:pointer;color:#374151;" ${ei===0?'disabled':''}>▲</button>
                <button onclick="movePmcsEq(${tmplId},${ei},1)" style="font-size:0.6rem;line-height:1;background:${ei===linked.length-1?'#f3f4f6':'#e5e7eb'};border:none;border-radius:2px;padding:1px 4px;cursor:pointer;color:#374151;" ${ei===linked.length-1?'disabled':''}>▼</button>
              </div>
              <button onclick="event.stopPropagation();removePmcsEquipment(${tmplId},${e.id})" style="font-size:0.65rem;color:#dc2626;background:none;border:none;cursor:pointer;padding:2px 4px;flex-shrink:0;" title="Remove">✕</button>
            </div>`).join('')}
      </div>
      <div style="padding:0.6rem 0.75rem;border-top:1px solid #e5e7eb;background:#f9fafb;">
        <div style="font-size:0.7rem;font-weight:600;color:#374151;margin-bottom:0.35rem;">Add Equipment</div>
        <div style="display:flex;gap:0.4rem;">
          <select id="pmcs-eq-picker" class="input" style="padding:0.3rem 0.4rem;font-size:0.75rem;flex:1;">
            <option value="">— select —</option>
            ${available.map(e=>`<option value="${e.id}">${esc(e.name)}${e.serial_num?' — '+esc(e.serial_num):''}</option>`).join('')}
          </select>
          <button onclick="addPmcsEquipment(${tmplId})" class="btn-primary" style="font-size:0.72rem;padding:0.3rem 0.6rem;white-space:nowrap;">Add</button>
        </div>
      </div>
    </div>`;

  const itemsPanel = `
    <div style="flex:1;display:flex;flex-direction:column;min-width:0;">
      <div style="padding:0.65rem 1rem;border-bottom:1px solid #f3f4f6;background:#f9fafb;font-size:0.8rem;font-weight:600;color:#374151;">
        ${selectedEq ? `Items for: ${esc(selectedEq.name)}` : '<span style="color:#9ca3af;">← Select equipment to manage its check items</span>'}
      </div>
      <div style="flex:1;overflow-y:auto;padding:0.5rem 1rem;" id="pmcs-items-list">
        ${!selectedEqId
          ? '<p style="color:#9ca3af;font-size:0.82rem;text-align:center;padding:2rem 0;">Select an equipment entry on the left to view and add check items.</p>'
          : eqItems.length === 0
            ? '<p style="color:#9ca3af;font-size:0.82rem;text-align:center;padding:2rem 0;">No items yet for this equipment. Add one below.</p>'
            : eqItems.map((it,i) => pmcsItemRow(it, i, eqItems.length)).join('')}
      </div>
      ${selectedEqId ? `
      <div style="padding:0.75rem 1rem;border-top:1px solid #e5e7eb;background:#f9fafb;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;">
          <div style="font-size:0.72rem;font-weight:700;color:#374151;">Add Check Item</div>
          ${linked.length > 1 ? `<button onclick="openPmcsCopyFrom(${tmplId},${selectedEqId})" class="btn-secondary" style="font-size:0.7rem;padding:0.2rem 0.6rem;">⧉ Copy items from…</button>` : ''}
        </div>
        <form id="pmcs-add-item-form" onsubmit="addPmcsItem(event,${tmplId},${selectedEqId})" style="display:grid;gap:0.4rem;">
          <div style="display:grid;grid-template-columns:50px 80px 1fr;gap:0.4rem;">
            <div><label class="label" style="font-size:0.65rem;">No.</label>
              <input class="input" name="item_no" placeholder="1" style="padding:0.35rem 0.4rem;font-size:0.8rem;">
            </div>
            <div><label class="label" style="font-size:0.65rem;">Interval</label>
              <select class="input" name="interval" style="padding:0.35rem 0.4rem;font-size:0.8rem;">
                ${INTERVALS.map(v=>`<option value="${v}">${v} — ${INT_LABELS[v]}</option>`).join('')}
              </select>
            </div>
            <div><label class="label" style="font-size:0.65rem;">Check Item *</label>
              <input class="input" name="check_item" required placeholder="What to inspect…" style="padding:0.35rem 0.5rem;font-size:0.8rem;">
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.4rem;">
            <div><label class="label" style="font-size:0.65rem;">Procedure</label>
              <input class="input" name="procedure" placeholder="How to perform check…" style="padding:0.35rem 0.5rem;font-size:0.8rem;">
            </div>
            <div><label class="label" style="font-size:0.65rem;">Not Ready If</label>
              <input class="input" name="not_ready_if" placeholder="NMC condition…" style="padding:0.35rem 0.5rem;font-size:0.8rem;">
            </div>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;padding-top:0.2rem;gap:0.5rem;flex-wrap:wrap;">
            <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.75rem;cursor:pointer;">
              <input type="checkbox" name="creates_task" value="true" style="width:14px;height:14px;">
              Auto-create maintenance task on fault
            </label>
            ${linked.length > 1 ? `<label style="display:flex;align-items:center;gap:0.4rem;font-size:0.75rem;cursor:pointer;">
              <input type="checkbox" id="pmcs-apply-multi" onchange="togglePmcsMultiEq(this.checked)" style="width:14px;height:14px;">
              Apply to multiple equipment
            </label>` : ''}
          </div>
          <div id="pmcs-multi-eq-picker" style="display:none;background:#fff;border:1px solid #e5e7eb;border-radius:0.4rem;padding:0.5rem;margin-top:0.1rem;">
            <div style="font-size:0.68rem;font-weight:700;color:#6b7280;margin-bottom:0.35rem;">Also add this item to:</div>
            ${linked.filter(e=>e.id!==selectedEqId).map(e=>`
              <label style="display:flex;align-items:center;gap:0.5rem;font-size:0.78rem;padding:0.2rem 0;cursor:pointer;">
                <input type="checkbox" name="extra_eq" value="${e.id}" style="width:13px;height:13px;">
                ${esc(e.name)}${e.serial_num?' <span style="color:#9ca3af;font-size:0.68rem;">'+esc(e.serial_num)+'</span>':''}
              </label>`).join('')}
          </div>
          <div style="display:flex;justify-content:flex-end;padding-top:0.25rem;">
            <button type="submit" class="btn-primary" style="font-size:0.78rem;padding:0.35rem 0.9rem;">+ Add Item</button>
          </div>
        </form>
      </div>` : ''}
    </div>`;

  const html = `<div class="modal" style="max-width:820px;height:560px;display:flex;flex-direction:column;">
    <div class="px-6 py-4 border-b flex items-center justify-between" style="flex-shrink:0;">
      <div>
        <h2 style="font-weight:700;">${esc(tmpl.title)}</h2>
        <div style="font-size:0.75rem;color:#6b7280;margin-top:0.1rem;">${linked.length} equipment · ${tmpl.items.length} total check items</div>
      </div>
      <button onclick="closeModal()" style="color:#9ca3af;font-size:1.5rem;background:none;border:none;cursor:pointer;">&times;</button>
    </div>
    <div style="display:flex;flex:1;min-height:0;">
      ${eqPanel}
      ${itemsPanel}
    </div>
  </div>`;

  modal(html);
}

function pmcsSelectEq(eqId) {
  const { tmplId } = _pmcsEditorState;
  _reloadPmcsEditor(tmplId, eqId);
}

async function addPmcsEquipment(tmplId) {
  const sel = document.getElementById('pmcs-eq-picker');
  const eqId = parseInt(sel?.value);
  if (!eqId) return;
  try {
    await api('POST', `/api/pmcs/templates/${tmplId}/equipment`, { equipment_id: eqId });
    toast('Equipment added.');
    await _reloadPmcsEditor(tmplId, eqId);
  } catch(err) { toast(err.message, false); }
}

async function removePmcsEquipment(tmplId, eqId) {
  if (!confirm('Remove this equipment and all its check items from this PMCS?')) return;
  await api('DELETE', `/api/pmcs/templates/${tmplId}/equipment/${eqId}`);
  toast('Equipment removed.');
  await _reloadPmcsEditor(tmplId, null);
}

function pmcsItemRow(it, idx, total) {
  const INT_COLORS = {B:'#1d4ed8',D:'#0369a1',A:'#0f766e',W:'#7c3aed',M:'#b45309'};
  const c = INT_COLORS[it.interval] || '#64748b';
  return `<div style="display:flex;align-items:flex-start;gap:0.6rem;padding:0.55rem 0;border-bottom:1px solid #f3f4f6;" id="pmcs-row-${it.id}">
    <span style="font-size:0.65rem;font-weight:800;padding:2px 7px;border-radius:9999px;background:${c};color:#fff;white-space:nowrap;margin-top:2px;">${it.interval}</span>
    <div style="flex:1;min-width:0;">
      <div style="font-size:0.82rem;font-weight:600;">${esc(it.check_item)}</div>
      ${it.procedure ? `<div style="font-size:0.72rem;color:#6b7280;margin-top:0.1rem;">${esc(it.procedure)}</div>` : ''}
      ${it.not_ready_if ? `<div style="font-size:0.68rem;color:#dc2626;margin-top:0.1rem;">NMC: ${esc(it.not_ready_if)}</div>` : ''}
      ${it.creates_task ? `<div style="font-size:0.65rem;color:#d97706;margin-top:0.1rem;">⚡ Auto-task on fault</div>` : ''}
    </div>
    <div style="display:flex;flex-direction:column;gap:1px;flex-shrink:0;">
      <button onclick="movePmcsItem(${it.id},${idx},-1)" style="font-size:0.6rem;line-height:1;background:${idx===0?'#f3f4f6':'#e5e7eb'};border:none;border-radius:2px;padding:1px 4px;cursor:pointer;color:#374151;" ${idx===0?'disabled':''}>▲</button>
      <button onclick="movePmcsItem(${it.id},${idx},1)" style="font-size:0.6rem;line-height:1;background:${idx===total-1?'#f3f4f6':'#e5e7eb'};border:none;border-radius:2px;padding:1px 4px;cursor:pointer;color:#374151;" ${idx===total-1?'disabled':''}>▼</button>
    </div>
    <button onclick="deletePmcsItem(${it.id})" style="font-size:0.68rem;background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;border-radius:0.375rem;padding:0.2rem 0.45rem;cursor:pointer;flex-shrink:0;">✕</button>

async function movePmcsEq(tmplId, idx, dir) {
  const s = _pmcsEditorState;
  const linked = s.tmpl.linked_equipment;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= linked.length) return;
  [linked[idx], linked[newIdx]] = [linked[newIdx], linked[idx]];
  await api('PUT', `/api/pmcs/templates/${tmplId}/equipment/reorder`, linked.map(e => e.id));
  await _reloadPmcsEditor(tmplId, s.selectedEqId);
}

async function movePmcsItem(itemId, idx, dir) {
  const s = _pmcsEditorState;
  const eqItems = s.tmpl.items.filter(i => i.equipment_id === s.selectedEqId);
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= eqItems.length) return;
  [eqItems[idx], eqItems[newIdx]] = [eqItems[newIdx], eqItems[idx]];
  await api('PUT', `/api/pmcs/templates/${s.tmplId}/items/reorder`, eqItems.map(i => i.id));
  await _reloadPmcsEditor(s.tmplId, s.selectedEqId);
}

function togglePmcsMultiEq(checked) {
  const picker = document.getElementById('pmcs-multi-eq-picker');
  if (picker) picker.style.display = checked ? 'block' : 'none';
}

async function addPmcsItem(e, tmplId, eqId) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = Object.fromEntries(fd);
  body.creates_task = fd.has('creates_task');
  delete body.extra_eq;  // handled separately below

  // Collect any extra equipment IDs from the multi-select picker
  const extraIds = [...fd.getAll('extra_eq')].map(Number).filter(Boolean);

  try {
    if (extraIds.length > 0) {
      // Bulk create: apply to this equipment + all checked extras
      const bulkBody = {
        equipment_ids: [eqId, ...extraIds],
        item_no: body.item_no || null,
        interval: body.interval,
        check_item: body.check_item,
        procedure: body.procedure || null,
        not_ready_if: body.not_ready_if || null,
        creates_task: body.creates_task,
      };
      const res = await api('POST', `/api/pmcs/templates/${tmplId}/items/bulk`, bulkBody);
      toast(`Item added to ${res.created} piece${res.created !== 1 ? 's' : ''} of equipment.`);
    } else {
      body.equipment_id = eqId;
      body.order_index = document.querySelectorAll('[id^="pmcs-row-"]').length;
      await api('POST', `/api/pmcs/templates/${tmplId}/items`, body);
      toast('Item added.');
    }
    await _reloadPmcsEditor(tmplId, eqId);
  } catch(err) { toast(err.message, false); }
}

async function openPmcsCopyFrom(tmplId, targetEqId) {
  const { tmpl } = _pmcsEditorState;
  const others = (tmpl.linked_equipment || []).filter(e => e.id !== targetEqId);

  const targetName = tmpl.linked_equipment.find(e => e.id === targetEqId)?.name || '';
  const overlay = document.createElement('div');
  overlay.className = 'modal-backdrop';
  overlay.id = 'pmcs-copy-backdrop';
  overlay.innerHTML = `<div class="modal" style="max-width:400px;">
    <div class="px-6 py-4 border-b flex items-center justify-between">

        <div style="font-size:0.72rem;color:#6b7280;margin-top:0.1rem;">Duplicates check items from another equipment</div>
      </div>
      <button onclick="document.getElementById('pmcs-copy-backdrop').remove()" style="color:#9ca3af;font-size:1.4rem;background:none;border:none;cursor:pointer;">&times;</button>
    </div>
    <div class="px-6 py-4 space-y-2">

async function confirmPmcsCopyFrom(tmplId, srcEqId, targetEqId, srcName) {
  document.getElementById('pmcs-copy-backdrop')?.remove();
  try {
    const res = await api('POST', `/api/pmcs/templates/${tmplId}/equipment/${targetEqId}/copy-from/${srcEqId}`);

async function deletePmcsItem(itemId) {

}

function csvFileSelected(input) {
  const f = input.files[0];
  if (!f) return;
  document.getElementById('csv-filename').textContent = f.name;
  document.getElementById('csv-submit-btn').disabled = false;
  document.getElementById('csv-result').style.display = 'none';
}

function csvHandleDrop(e) {
  e.preventDefault();
  document.getElementById('csv-drop-zone').style.borderColor = '#d1d5db';
  const f = e.dataTransfer.files[0];
  if (!f) return;
  document.getElementById('csv-file-input').files; // can't set directly
  // manually assign via DataTransfer workaround
  const dt = new DataTransfer();
  dt.items.add(f);
  document.getElementById('csv-file-input').files = dt.files;
  csvFileSelected(document.getElementById('csv-file-input'));
}

async function csvSubmit(type, pmcsTemplateId) {
  const cfg = CSV_CONFIG[type];
  if (type === 'pmcs-items' && pmcsTemplateId) {
    cfg.uploadUrl = `/api/csv/pmcs/${pmcsTemplateId}/items/import`;
    cfg.refreshFn = () => { closeModal(); openPmcsItems(pmcsTemplateId); };
  }
  const fileInput = document.getElementById('csv-file-input');
  if (!fileInput.files.length) return;

  const btn = document.getElementById('csv-submit-btn');
  btn.disabled = true;
  btn.textContent = 'Importing…';

  const fd = new FormData();
  fd.append('file', fileInput.files[0]);

  try {
    const r = await fetch(cfg.uploadUrl, { method: 'POST', body: fd, headers:{'Authorization':'Bearer '+(getToken()||'')} });
    const data = await r.json();
    const resultEl = document.getElementById('csv-result');
    resultEl.style.display = 'block';

    if (!r.ok) {
      resultEl.style.background = '#fef2f2';
      resultEl.style.border = '1px solid #fca5a5';
      resultEl.innerHTML = `<strong style="color:#dc2626;">Import failed:</strong> ${data.detail || 'Unknown error'}`;
      btn.disabled = false;
      btn.textContent = 'Import';
      return;
    }

    const hasErrors = data.errors && data.errors.length > 0;
    resultEl.style.background = hasErrors ? '#fffbeb' : '#f0fdf4';
    resultEl.style.border = `1px solid ${hasErrors ? '#fcd34d' : '#86efac'}`;
    resultEl.innerHTML = `
      <div style="font-weight:600;color:${hasErrors ? '#92400e' : '#15803d'};">
        ✓ Import complete
      </div>
      <div style="margin-top:0.35rem;color:#374151;">
        ${data.created ? `<span style="margin-right:1rem;">+ ${data.created} created</span>` : ''}
        ${data.updated ? `<span style="margin-right:1rem;">↻ ${data.updated} updated</span>` : ''}
        ${data.skipped ? `<span style="color:#b45309;">${data.skipped} skipped</span>` : ''}
      </div>
      ${hasErrors ? `<div style="margin-top:0.5rem;font-size:0.72rem;color:#92400e;">${data.errors.slice(0,5).join('<br>')}</div>` : ''}
    `;
    btn.textContent = 'Done';
    if (cfg.refreshFn) cfg.refreshFn();
  } catch(err) {
    toast('Import failed: ' + err.message, false);
    btn.disabled = false;
    btn.textContent = 'Import';
  }
}

async function saveSko(e, id) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const eqIds = fd.getAll('eq_ids').map(Number);
  const body = {
    name: fd.get('name'),
    nsn: fd.get('nsn') || null,
    description: fd.get('description') || null,
    notes: fd.get('notes') || null,
    equipment_ids: eqIds,
  };
  try {
    if (id) await api('PUT', `/api/skos/${id}`, body);
    else await api('POST', '/api/skos', body);
    document.getElementById('sko-modal-backdrop').remove();
    toast(id ? 'SKO updated.' : 'SKO created.');
    await skosPage();
  } catch(err) { toast(err.message, false); }
}

async function deleteSko(id, name) {
  if (!confirm(`Delete SKO "${name}" and all its records?`)) return;
  try {
    await api('DELETE', `/api/skos/${id}`);
    toast('SKO deleted.');
    await skosPage();
  } catch(err) { toast(err.message, false); }
}

async function openEqFromSko(eqId, skoId) {
  document.getElementById('sko-detail-backdrop')?.remove();
  if (!equipmentData.length) equipmentData = await api('GET', '/api/equipment');
  await openEqDetail(eqId);
  // stash skoId so closing eq detail can reopen SKO
  window._prevSkoId = skoId;
}

async function confirmAddEquipment(skoId) {
  const checks = document.querySelectorAll('#sko-addeq-backdrop input[name="eq_ids"]:checked');

    await Promise.all(ids.map(id => api('POST', `/api/skos/${skoId}/equipment/${id}`, {})));

    document.getElementById('sko-detail-backdrop').remove();
    toast(`Added ${ids.length} equipment item${ids.length!==1?'s':''}.`);

function skoNewPmcsItemRow(i) {
  return `<div id="pmcs-item-row-${i}" style="display:grid;grid-template-columns:50px 60px 1fr 24px;gap:4px;margin-bottom:4px;">
    <input class="form-input" style="font-size:0.78rem;padding:4px 6px;" placeholder="${i+1}" name="item_no_${i}" value="${i+1}">
    <select class="form-input" style="font-size:0.78rem;padding:4px 6px;" name="interval_${i}">
      <option value="B">B</option><option value="D">D</option>
      <option value="W">W</option><option value="M">M</option>
      <option value="Q">Q</option><option value="S">S</option>
      <option value="A">A</option>
    </select>
    <input class="form-input" style="font-size:0.78rem;padding:4px 6px;" placeholder="Check item description" name="check_item_${i}" required>
    <button type="button" onclick="document.getElementById('pmcs-item-row-${i}').remove()" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:14px;padding:0;">✕</button>
  </div>`;
}

function addPmcsItemRow() {
  const list = document.getElementById('pmcs-item-list');
  const div = document.createElement('div');
  div.innerHTML = skoNewPmcsItemRow(_pmcsItemIdx++);
  list.appendChild(div.firstChild);
}

async function submitSkoSetupPmcs(e, eqId, skoId) {
  e.preventDefault();
  const fd = new FormData(e.target);
  try {
    // 1. Create template
    const tmpl = await api('POST', '/api/pmcs/templates', {
      title: fd.get('title'),
      description: fd.get('description') || null,
      equipment_id: eqId,
    });
    // 2. Add check items
    const rows = document.querySelectorAll('#pmcs-item-list > div[id^="pmcs-item-row-"]');
    let order = 0;
    for (const row of rows) {
      const i = row.id.replace('pmcs-item-row-','');
      const checkItem = fd.get(`check_item_${i}`);
      if (!checkItem) continue;
      await api('POST', `/api/pmcs/templates/${tmpl.id}/items`, {
        item_no: fd.get(`item_no_${i}`) || String(order+1),
        interval: fd.get(`interval_${i}`) || 'B',
        check_item: checkItem,
        order_index: order++,
      });
    }
    document.getElementById('sko-pmcs-setup-backdrop').remove();
    document.getElementById('sko-detail-backdrop')?.remove();
    toast('PMCS template created — opening checklist…');
    // Refresh SKO data then re-open detail, and open checklist
    skosData = await api('GET', '/api/skos');
    await openSkoDetail(skoId);
    setTimeout(() => window.open(`/pmcs/${tmpl.id}`, '_blank'), 300);
  } catch(err) { toast(err.message, false); }
}

const SEVERITY_COLOR = { critical:'#dc2626', urgent:'#d97706', routine:'#6b7280' };

async function faultsPage() {
  $('page-actions').innerHTML = `<button onclick="openFaultModal()" class="btn-primary">+ Report Fault</button>`;

    faultFilter = statusFilter;

    const tabs = ['open','in_progress','resolved','all'];
    $('page-content').innerHTML = `
      <div class="card">
        <div style="display:flex;gap:0.5rem;margin-bottom:1rem;flex-wrap:wrap;">
          ${tabs.map(t=>`<button onclick="renderFaultTab('${t}')" class="btn-secondary${faultFilter===t?' active-tab':''}" style="font-size:0.8rem;${faultFilter===t?'background:#1e3a5f;color:#fff;':''}">${t.replace('_',' ').replace(/\b\w/g,c=>c.toUpperCase())}</button>`).join('')}
        </div>
        ${faults.length ? `
        <div class="space-y-3">${faults.map(f=>`
          <div style="border:1px solid #e5e7eb;border-left:4px solid ${SEVERITY_COLOR[f.severity]||'#6b7280'};border-radius:0.5rem;padding:1rem;background:${SEVERITY_BG[f.severity]||'#f9fafb'};">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;">
              <div style="flex:1;min-width:0;">
                <div style="font-weight:600;margin-bottom:0.25rem;">${esc(f.title)}</div>
                <div style="font-size:0.8rem;color:#6b7280;margin-bottom:0.4rem;">${esc(f.equipment_name)}${f.location?' · '+esc(f.location):''}</div>
                ${f.description ? `<div style="font-size:0.85rem;color:#374151;margin-bottom:0.4rem;">${esc(f.description)}</div>` : ''}
                <div style="font-size:0.75rem;color:#9ca3af;">Reported by ${esc(f.reported_by)} · ${f.created_at.slice(0,10)}</div>
                ${f.resolution ? `<div style="font-size:0.78rem;color:#059669;margin-top:0.3rem;">✓ ${esc(f.resolution)}</div>` : ''}
              </div>
              <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.4rem;flex-shrink:0;">
                <span style="font-size:0.7rem;font-weight:700;padding:2px 8px;border-radius:9999px;text-transform:uppercase;background:${SEVERITY_COLOR[f.severity]}22;color:${SEVERITY_COLOR[f.severity]};">${f.severity}</span>
                <span style="font-size:0.7rem;padding:2px 8px;border-radius:9999px;text-transform:uppercase;background:#e5e7eb;color:#374151;">${f.status.replace('_',' ')}</span>
                ${isTech() ? `<button onclick="openFaultUpdate(${f.id},'${esc(f.status)}')" style="font-size:0.72rem;background:#dce8f5;color:#141414;border:none;border-radius:0.375rem;padding:0.2rem 0.6rem;cursor:pointer;">Update</button>` : ''}
                ${isAdmin() ? `<button onclick="deleteFault(${f.id})" style="font-size:0.72rem;background:#fef2f2;color:#dc2626;border:none;border-radius:0.375rem;padding:0.2rem 0.6rem;cursor:pointer;">Delete</button>` : ''}
              </div>
            </div>
          </div>`).join('')}
        </div>` : `<p class="text-sm text-gray-400">No ${faultFilter==='all'?'':faultFilter} faults.</p>`}
      </div>`;
  }
  window.renderFaultTab = renderFaults;
  renderFaults('open');
}

           <div><span class="text-xs text-gray-400">From:</span> ${esc(s.NOTIFY_EMAIL_FROM||'—')}</div>
           <div><span class="text-xs text-gray-400">Days ahead:</span> ${esc(s.NOTIFY_DAYS_AHEAD||'7')}</div>
         </div>
         <div class="mt-2"><span class="badge-green">Configured</span></div>`
      : '<span class="badge-gray">Not configured</span>';
  } catch(e) {

}

async function loadSmtpForm() {
  const s = await api('GET', '/api/settings/smtp');
  const form = document.getElementById('smtp-form');
  ['NOTIFY_EMAIL_TO','NOTIFY_EMAIL_FROM','SMTP_HOST','SMTP_PORT','SMTP_USER','NOTIFY_DAYS_AHEAD'].forEach(k => {
    const el = form.elements[k];
    if (el) el.value = s[k] || '';
  });
  // don't pre-fill password (masked)
  document.getElementById('smtp-display').style.display = 'none';
  document.getElementById('smtp-edit-btn').style.display = 'none';
  form.style.display = 'block';
}

function cancelSmtpEdit() {
  document.getElementById('smtp-form').style.display = 'none';
  document.getElementById('smtp-display').style.display = '';
  document.getElementById('smtp-edit-btn').style.display = '';
}

async function saveSmtp(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = Object.fromEntries(fd.entries());
  const resultEl = document.getElementById('smtp-result');
  try {
    await api('PUT', '/api/settings/smtp', body);
    resultEl.style.display = 'block';
    resultEl.style.background = '#f0fdf4';
    resultEl.style.border = '1px solid #86efac';
    resultEl.textContent = '✓ Settings saved.';
    setTimeout(() => { cancelSmtpEdit(); loadSmtpDisplay(); resultEl.style.display = 'none'; }, 1500);
  } catch(err) {
    resultEl.style.display = 'block';
    resultEl.style.background = '#fef2f2';
    resultEl.style.border = '1px solid #fca5a5';
    resultEl.textContent = 'Error: ' + err.message;
  }
}

async function testSmtp() {
  const btn = document.getElementById('smtp-test-btn');
  const resultEl = document.getElementById('smtp-result');
  // If the form is open and password is blank, warn — test uses saved DB value
  const passField = document.querySelector('#smtp-form [name="SMTP_PASS"]');
  if (passField && !passField.value) {
    resultEl.style.display = 'block';
    resultEl.style.background = '#fffbeb';
    resultEl.style.border = '1px solid #fcd34d';
    resultEl.textContent = 'Note: testing with saved password (password field is blank). Save new credentials first if you changed them.';
  }
  btn.disabled = true;
  btn.textContent = 'Sending…';
  try {
    await api('POST', '/api/settings/smtp/test');
    resultEl.style.display = 'block';
    resultEl.style.background = '#f0fdf4';
    resultEl.style.border = '1px solid #86efac';
    resultEl.textContent = '✓ Test email sent — check your inbox.';
  } catch(err) {
    resultEl.style.display = 'block';
    resultEl.style.background = '#fef2f2';
    resultEl.style.border = '1px solid #fca5a5';
    resultEl.textContent = 'Failed: ' + err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Send Test Email';
  }
}

function checkPwMatch() {
  const p1 = $('um-password'), p2 = $('um-password2'), msg = $('um-pw-match');
  if (!p1 || !p2 || !msg) return;
  if (!p2.value) { msg.style.display='none'; return; }
  const match = p1.value === p2.value;
  msg.style.display = 'block';
  msg.style.color = match ? '#4ade80' : '#f87171';
  msg.textContent = match ? '✓ Passwords match' : '✗ Passwords do not match';
}

async function saveUser(e, id) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = Object.fromEntries(fd);
  if (!body.password) {
    delete body.password;
  } else if (!id) {
    const p2 = $('um-password2');
    if (p2 && body.password !== p2.value) {
      toast('Passwords do not match.', false); return;
    }
  }
  try {
    if (id) await api('PUT', `/api/auth/users/${id}`, body);
    else await api('POST', '/api/auth/users', body);
    closeModal();
    toast(id ? 'User updated.' : 'User created.');
    usersData = await api('GET', '/api/auth/users');
    renderUsersTable();
  } catch(err) { toast(err.message, false); }
}

async function deleteUser(id, username) {
  if (!confirm(`Delete user "${username}"?`)) return;
  try {
    await api('DELETE', `/api/auth/users/${id}`);
    toast('User deleted.');
    usersData = await api('GET', '/api/auth/users');
    renderUsersTable();
  } catch(err) { toast(err.message, false); }
}

  e.preventDefault();
  const fd = new FormData(e.target);
  const results = {}, remarks = {};
  RS_CHECKLIST.forEach(sec => sec.items.forEach(item => {
    const v = fd.get(`chk_${item.key}`);
    if (v) results[item.key] = v;
    const r = fd.get(`rem_${item.key}`);
    if (r) remarks[item.key] = r;
  }));

  const body = {
    date_out: fd.get('date_out'),
    beginning_mileage: parseInt(fd.get('beginning_mileage')) || null,
    accident_card: fd.get('accident_card') === '1',
    operator_name: fd.get('operator_name') || null,
    operator_phone: fd.get('operator_phone') || null,
    dispatcher_name: fd.get('dispatcher_name') || null,
    notes: fd.get('notes') || null,
    results, remarks, status: 'complete',
  };
  const resp = await api('POST', `/api/rolling-stock/${vid}/inspections`, body);
  document.getElementById('dispatch-backdrop').remove();
  toast('Inspection saved — opening FK5105…');
  rsData = await api('GET', '/api/rolling-stock');
  renderRsTable();
  setTimeout(() => window.open(`/api/rolling-stock/inspections/${resp.id}/print?token=${getToken()}`, '_blank'), 300);
}

async function submitReorder(e, itemId) {
  e.preventDefault();
  const fd = new FormData(e.target);
  await api('POST', '/api/reorder', {
    item_id: itemId,
    qty_requested: parseInt(fd.get('qty')),
    requested_by: fd.get('requested_by') || null,
    supplier: fd.get('supplier') || null,
    notes: fd.get('notes') || null,
  });
  document.getElementById('reorder-backdrop').remove();
  toast('Reorder request submitted.');
  // Refresh inventory page if open
  if (document.getElementById('reorder-tab-btn')) {
    document.getElementById('reorder-tab-btn').click();
  }
}

async function setReorderStatus(id, status) {
  await api('PATCH', `/api/reorder/${id}`, { status });
  if (status === 'received') toast('Marked received — inventory updated.');
  else toast(`Marked as ${status}.`);
  // re-render whichever view is showing reorder data
  if (document.querySelector('[data-reorder-table]')) {
    const html = await loadReorderTab();
    document.querySelector('[data-reorder-table]').innerHTML = html;
  }
}

async function deleteReorder(id) {
  if (!confirm('Delete this reorder request?')) return;
  await api('DELETE', `/api/reorder/${id}`);
  toast('Deleted.');
  if (document.querySelector('[data-reorder-table]')) {
    const html = await loadReorderTab();
    document.querySelector('[data-reorder-table]').innerHTML = html;
  }
}

  const r = reorderData.find(x => x.id === id);
  if (!r) return;
  const w = window.open('', '_blank');

// ─── Helpers ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

<script>
// ── PWA install ───────────────────────────────────────────────────────────────
let _pwaPrompt = null;

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _pwaPrompt = e;
  const bar = document.getElementById('pwa-install-bar');
  if (bar) bar.style.display = '';
});

window.addEventListener('appinstalled', () => {
  _pwaPrompt = null;
  const bar = document.getElementById('pwa-install-bar');
  if (bar) bar.style.display = 'none';
});

function pwaInstall() {
  if (_pwaPrompt) {
    _pwaPrompt.prompt();
    _pwaPrompt.userChoice.then(() => { _pwaPrompt = null; });
  } else {
    // iOS / browsers that don't support beforeinstallprompt
    modal(`<div class="modal" style="max-width:22rem;">

// ── Service Worker ─────────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/static/sw.js').catch(() => {});
  });
}

// Show install bar on iOS (beforeinstallprompt never fires there)
window.addEventListener('load', () => {
  const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;
  if (isIos && !isStandalone) {
    const bar = document.getElementById('pwa-install-bar');
    const lbl = document.getElementById('pwa-install-label');
    if (bar) bar.style.display = '';
    if (lbl) lbl.textContent = 'Add to Home Screen';
  }
});
