<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAINT SUPER — Maintenance &amp; Calibration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#141414', light: '#2a2a2a', dark: '#0a0a0a' },
          },
          fontFamily: {
            sans: ['"Open Sans"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    /* ── Whitwerx palette ──
       #141414  near-black  (sidebar, buttons, headers)
       #1e3a5f  parchment   (page bg, active nav highlight)
       #696969  mid-gray    (secondary text, dividers)
       #FFFFFF  white       (cards, modals)
       #040404  text        (body copy)
    ── */
    *, *::before, *::after { font-family: 'Open Sans', sans-serif; }
    [x-cloak]{display:none!important}

    /* Nav */
    .nav-link { display:flex; align-items:center; gap:0.75rem; padding:0.625rem 1rem; border-radius:0.375rem; font-size:0.875rem; font-weight:500; transition:background-color 150ms; text-decoration:none; color:rgba(255,255,255,0.82); letter-spacing:0.01em; }
    .nav-link:hover { background-color:rgba(255,255,255,0.08); color:#fff; }
    .nav-link.active { background-color:#1e3a5f; color:#fff; font-weight:700; }

    /* Badges */
    .badge-red    { display:inline-flex; align-items:center; padding:0.125rem 0.5rem; border-radius:0.25rem; font-size:0.75rem; font-weight:600; background-color:#fee2e2; color:#b91c1c; white-space:nowrap; }
    .badge-yellow { display:inline-flex; align-items:center; padding:0.125rem 0.5rem; border-radius:0.25rem; font-size:0.75rem; font-weight:600; background-color:#fef3c7; color:#92400e; white-space:nowrap; }
    .badge-green  { display:inline-flex; align-items:center; padding:0.125rem 0.5rem; border-radius:0.25rem; font-size:0.75rem; font-weight:600; background-color:#d1fae5; color:#065f46; white-space:nowrap; }
    .badge-blue   { display:inline-flex; align-items:center; padding:0.125rem 0.5rem; border-radius:0.25rem; font-size:0.75rem; font-weight:600; background-color:#dce8f5; color:#141414; white-space:nowrap; }
    .badge-gray   { display:inline-flex; align-items:center; padding:0.125rem 0.5rem; border-radius:0.25rem; font-size:0.75rem; font-weight:600; background-color:#e5e7eb; color:#374151; white-space:nowrap; }

    /* Cards */
    .card { background-color:#fff; border-radius:0.75rem; box-shadow:0 1px 4px rgba(0,0,0,0.08); border:1px solid #dce8f5; padding:1.25rem; }

    /* Buttons */
    .btn-primary { display:inline-flex; align-items:center; gap:0.5rem; padding:0.5rem 1rem; background-color:#1e3a5f; color:#fff; font-size:0.875rem; font-weight:600; border-radius:0.375rem; border:none; cursor:pointer; transition:background-color 150ms; letter-spacing:0.01em; }
    .btn-primary:hover { background-color:#2a4a70; }
    .btn-secondary { display:inline-flex; align-items:center; gap:0.5rem; padding:0.5rem 1rem; background-color:#fff; color:#141414; font-size:0.875rem; font-weight:500; border-radius:0.375rem; border:1px solid #c8d8e8; cursor:pointer; transition:background-color 150ms; }
    .btn-secondary:hover { background-color:#dce8f5; }
    .btn-danger { display:inline-flex; align-items:center; gap:0.5rem; padding:0.375rem 0.75rem; background-color:#fef2f2; color:#dc2626; font-size:0.75rem; font-weight:500; border-radius:0.375rem; border:none; cursor:pointer; transition:background-color 150ms; }
    .btn-danger:hover { background-color:#fee2e2; }

    /* Inputs */
    .input { display:block; width:100%; border-radius:0.375rem; border:1px solid #c8d8e8; padding:0.5rem 0.75rem; font-size:0.875rem; box-shadow:0 1px 2px rgba(0,0,0,0.04); outline:none; box-sizing:border-box; background:#fff; font-family:inherit; }
    .input:focus { border-color:#141414; box-shadow:0 0 0 2px rgba(20,20,20,0.12); }
    .label { display:block; font-size:0.875rem; font-weight:600; color:#141414; margin-bottom:0.25rem; }

    /* Table */
    .table-row { transition:background-color 150ms; }
    .table-row:hover { background-color:#f4f8fc; }

    /* Modal */
    .modal-backdrop { position:fixed; inset:0; background-color:rgba(0,0,0,0.55); z-index:40; display:flex; align-items:center; justify-content:center; padding:1rem; }
    .modal { background-color:#fff; border-radius:0.75rem; box-shadow:0 25px 50px rgba(0,0,0,0.3); width:100%; max-width:32rem; max-height:90vh; overflow-y:auto; z-index:50; position:relative; }

    /* ── Mobile ── */
    #sidebar-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:29; }
    #sidebar-overlay.open { display:block; }
    #hamburger { display:none; align-items:center; justify-content:center; padding:0.4rem; background:none; border:none; cursor:pointer; color:#374151; border-radius:0.375rem; margin-right:0.5rem; }
    #hamburger:hover { background:#f3f4f6; }
    @media (max-width: 768px) {
      #sidebar { position:fixed; top:0; bottom:0; left:-17rem; width:16rem; z-index:30; transition:left 0.25s ease; }
      #sidebar.open { left:0; }
      #hamburger { display:flex; }
      .col-m-hide { display:none !important; }
      .modal { border-radius:0.75rem; }
      #page-content { padding: 0.75rem; }
      header.top-bar { padding-left: 0.75rem; padding-right: 0.75rem; }
    }
  </style>
</head>
<body class="h-full font-sans text-gray-800" style="background-color:#1e3a5f;">

<div class="flex h-screen overflow-hidden">

  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="w-64 flex-shrink-0 text-white flex flex-col" style="background-color:#141414;">
    <div class="px-5 py-5" style="border-bottom:1px solid rgba(241,228,208,0.15);">

      <div class="text-xs mt-0.5" style="color:rgba(168,200,232,0.5);letter-spacing:0.05em;">WHITWERX · MAINTENANCE OPS</div>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1" id="sidebar-nav">
      <a href="/dashboard"   class="nav-link" data-page="dashboard">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Dashboard
      </a>
      <a href="/equipment"   class="nav-link" data-page="equipment">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>

      <a href="/calibration" class="nav-link" data-page="calibration">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
        Calibration
      </a>
      <a href="/inventory"   class="nav-link" data-page="inventory">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
        Inventory
      </a>
      <a href="/pmcs" class="nav-link" data-page="pmcs">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"/></svg>
        PMCS
      </a>
      <a href="/skos" class="nav-link" data-page="skos">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 10V11m0 0L4 7"/></svg>

    <div class="px-5 py-3 flex items-center justify-between text-xs" style="border-top:1px solid rgba(241,228,208,0.15);color:rgba(241,228,208,0.45);">

          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>

        <span id="nav-bell-badge" style="display:none;position:absolute;top:-4px;right:-6px;background:#ef4444;color:#fff;font-size:0.6rem;font-weight:700;border-radius:9999px;padding:1px 4px;min-width:16px;text-align:center;"></span>

  <!-- Main content -->
  <main class="flex-1 flex flex-col overflow-hidden">
    <!-- Top bar -->
    <header class="top-bar px-6 py-4 flex items-center justify-between flex-shrink-0" style="background:#fff;border-bottom:1px solid #dce8f5;">

          <span id="user-name" style="font-weight:600;color:#374151;"></span>
          <span id="user-role-badge"></span>
          <button onclick="logout()" style="font-size:0.75rem;color:#6b7280;background:none;border:1px solid #e5e7eb;cursor:pointer;padding:0.2rem 0.5rem;border-radius:0.25rem;line-height:1.4;">Sign out</button>
        </div>
      </div>

    <!-- Page content -->
    <div class="flex-1 overflow-y-auto p-6" id="page-content">
      <div class="flex items-center justify-center h-full">
        <div class="text-gray-400">Loading…</div>
      </div>

</div>

<!-- Toast -->
<div id="toast" class="fixed bottom-4 right-4 z-50 hidden">
  <div id="toast-inner" class="px-4 py-3 rounded-lg shadow-lg text-sm font-medium text-white"></div>
</div>

<!-- Modal container -->
<div id="modal-container"></div>

<script>
// ─── Utilities ────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const el = (tag, cls, html) => { const e = document.createElement(tag); if(cls) e.className=cls; if(html!=null) e.innerHTML=html; return e; };

// ─── Auth ─────────────────────────────────────────────────────────────────────
let currentUser = null;
function getToken() { return localStorage.getItem('auth_token'); }
function isAdmin() { return currentUser?.role === 'admin'; }
function logout() {
  ['auth_token','auth_username','auth_role'].forEach(k => localStorage.removeItem(k));
  window.location.href = '/login';
}
async function initAuth() {
  const token = getToken();
  if (!token) { window.location.href = '/login'; return false; }
  try {
    currentUser = await fetch('/api/auth/me', {
      headers: { 'Authorization': 'Bearer ' + token }
    }).then(r => { if (!r.ok) throw new Error(); return r.json(); });
    const badge = $('user-badge');
    if (badge) {
      badge.style.display = 'flex';
      $('user-name').textContent = currentUser.username;
      const roleEl = $('user-role-badge');
      roleEl.textContent = currentUser.role;
      roleEl.style.cssText = `font-size:0.65rem;padding:1px 6px;border-radius:9999px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;background:${currentUser.role==='admin'?'#fee2e2':'#dce8f5'};color:${currentUser.role==='admin'?'#b91c1c':'#1e3a5f'};`;
    }
    if (isAdmin()) document.querySelectorAll('.admin-nav').forEach(el => el.style.display = '');
    return true;
  } catch(e) {
    localStorage.removeItem('auth_token');
    window.location.href = '/login';
    return false;
  }
}

async function api(method, path, body) {
  const token = getToken();
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (r.status === 401) { localStorage.removeItem('auth_token'); window.location.href = '/login'; return; }
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.detail || r.statusText); }
  return r.json();
}

function toast(msg, ok=true) {
  const t = $('toast'), ti = $('toast-inner');
  ti.textContent = msg;
  ti.className = `px-4 py-3 rounded-lg shadow-lg text-sm font-medium text-white ${ok?'bg-green-600':'bg-red-600'}`;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 3000);
}

function fmtDate(d) { return d ? new Date(d+'T00:00:00').toLocaleDateString() : '—'; }
function daysUntil(d) {
  if (!d) return null;
  return Math.round((new Date(d+'T00:00:00') - new Date()) / 86400000);
}
function dueBadge(d, statusOverride) {
  if (statusOverride === 'overdue' || statusOverride === 'fail') return `<span class="badge-red">${statusOverride==='fail'?'FAIL':'Overdue'}</span>`;
  if (statusOverride === 'completed') return `<span class="badge-green">Done</span>`;
  const days = daysUntil(d);
  if (days === null) return `<span class="badge-gray">No date</span>`;
  if (days < 0)  return `<span class="badge-red">Overdue ${Math.abs(days)}d</span>`;
  if (days <= 7) return `<span class="badge-yellow">Due in ${days}d</span>`;
  if (days <= 30) return `<span class="badge-blue">Due in ${days}d</span>`;
  return `<span class="badge-gray">${fmtDate(d)}</span>`;
}

function modal(html, onload) {
  const mc = $('modal-container');
  mc.innerHTML = `<div class="modal-backdrop" id="modal-backdrop">${html}</div>`;
  if (onload) onload();
  $('modal-backdrop').addEventListener('click', e => { if(e.target.id==='modal-backdrop') closeModal(); });
}
function closeModal() { $('modal-container').innerHTML = ''; }


// ─── Mobile sidebar ──────────────────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}

// ─── Router ───────────────────────────────────────────────────────────────────
const PAGES = { dashboard: dashboardPage, equipment: equipmentPage, maintenance: maintenancePage, calibration: calibrationPage, inventory: inventoryPage, pmcs: pmcsPage, users: usersPage, skos: skosPage };
const TITLES = { dashboard:'Dashboard', equipment:'Equipment Registry', maintenance:'Maintenance Tasks', calibration:'Calibration Records', inventory:'Parts & Inventory', pmcs:'PMCS Checklists', users:'User Management', skos:'SKOs — Sets, Kits & Outfits' };

function navigate(page) {
  history.pushState({page}, '', `/${page}`);
  renderPage(page);
}

function renderPage(page) {
  document.querySelectorAll('.nav-link').forEach(a => a.classList.toggle('active', a.dataset.page===page));
  $('page-title').textContent = TITLES[page] || 'Dashboard';
  $('page-actions').innerHTML = '';
  $('page-content').innerHTML = '<div class="flex items-center justify-center h-32"><div class="text-gray-400">Loading…</div></div>';
  (PAGES[page] || dashboardPage)();
}

document.querySelectorAll('.nav-link').forEach(a => {
  a.addEventListener('click', e => { e.preventDefault(); closeSidebar(); navigate(a.dataset.page); });
});
window.addEventListener('popstate', e => renderPage(e.state?.page || 'dashboard'));
initAuth().then(ok => { if (ok) renderPage('{{ page }}'); });

// Bell: load overdue count
(async () => {
  try {
    const data = await api('GET', '/api/dashboard');
    const count = (data.counts.overdue_tasks || 0) + (data.counts.cal_overdue || 0);
    const badge = document.getElementById('nav-bell-badge');
    if (count > 0 && badge) {
      badge.textContent = count;
      badge.style.display = 'block';
      document.getElementById('nav-bell').querySelector('svg').style.color = '#fbbf24';
    }
  } catch(e) {}
})();

// QR scan: ?open=<equipment_id> → open detail panel
(async () => {
  const openId = parseInt(new URLSearchParams(window.location.search).get('open'));
  if (!openId) return;
  // ensure equipment data is loaded
  if (!window.equipmentData || !window.equipmentData.length) {
    window.equipmentData = await api('GET', '/api/equipment').catch(()=>[]);
  }
  navigate('equipment');
  await new Promise(r => setTimeout(r, 400));
  openEqDetail(openId);
})();


// ─── Dashboard ────────────────────────────────────────────────────────────────
async function dashboardPage() {
  const data = await api('GET', '/api/dashboard');
  const c = data.counts;

  $('page-content').innerHTML = `
    <!-- Stat cards -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
      ${statCard('Equipment', c.total_equipment, 'bg-stone-100 text-stone-800', 'Active')}
      ${statCard('Overdue Tasks', c.overdue_tasks, c.overdue_tasks?'bg-red-50 text-red-700':'bg-green-50 text-green-700', 'Maintenance')}
      ${statCard('Cal Overdue', c.cal_overdue, c.cal_overdue?'bg-red-50 text-red-700':'bg-green-50 text-green-700', 'Calibration')}
      ${statCard('Low Stock', c.low_stock, c.low_stock?'bg-yellow-50 text-yellow-700':'bg-green-50 text-green-700', 'Inventory items')}
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
      <!-- Upcoming maintenance -->
      <div class="card lg:col-span-2">
        <h2 class="font-semibold text-gray-700 mb-3">Upcoming Maintenance</h2>
        ${data.upcoming_tasks.length ? `
        <table class="w-full text-sm">
          <thead><tr class="text-xs text-gray-500 border-b">
            <th class="pb-2 text-left">Task</th><th class="pb-2 text-left">Equipment</th><th class="pb-2 text-left">Due</th>
          </tr></thead>
          <tbody>${data.upcoming_tasks.map(t=>`
            <tr class="table-row border-b last:border-0" ondblclick="dashEditTask(${t.id})" title="Double-click to edit" style="cursor:pointer;">
              <td class="py-2 pr-4 font-medium">${esc(t.title)}</td>
              <td class="py-2 pr-4 text-gray-500">${esc(t.equipment_name)}</td>
              <td class="py-2">${dueBadge(t.next_due, t.status)}</td>
            </tr>`).join('')}
          </tbody>
        </table>` : '<p class="text-sm text-gray-400">No upcoming tasks.</p>'}
      </div>

      <!-- Upcoming calibrations -->
      <div class="card">
        <h2 class="font-semibold text-gray-700 mb-3">Calibration Due</h2>
        ${data.upcoming_cals.length ? `

    <!-- Lifecycle alerts -->
    ${data.lifecycle_alerts && data.lifecycle_alerts.length ? `
    <div class="card mt-4" style="border-left:4px solid #b45309;">
      <h2 class="font-semibold text-gray-700 mb-3">Equipment Lifecycle Alerts</h2>
      <table class="w-full text-sm">
        <thead><tr class="text-xs text-gray-500 border-b">
          <th class="pb-2 text-left">Equipment</th><th class="pb-2 text-left col-m-hide">Serial #</th>
          <th class="pb-2 text-left">Warranty Expiry</th><th class="pb-2 text-left">End of Life</th>
        </tr></thead>
        <tbody>${data.lifecycle_alerts.map(e=>`
          <tr class="table-row border-b last:border-0">
            <td class="py-2 pr-4 font-medium">${esc(e.name)}</td>
            <td class="py-2 pr-4 text-gray-500 font-mono text-xs col-m-hide">${esc(e.serial_num||'—')}</td>

          </tr>`).join('')}
        </tbody>
      </table>
    </div>` : ''}
  `;
}

function statCard(label, val, cls, sub) {
  return `<div class="card flex flex-col gap-1">
    <div class="text-3xl font-bold ${cls}">${val}</div>
    <div class="text-sm font-medium text-gray-700">${label}</div>
    <div class="text-xs text-gray-400">${sub}</div>
  </div>`;
}


// ─── Equipment ────────────────────────────────────────────────────────────────
let equipmentData = [];
const EQ_CATS = ['Hand Tools','Power Tools','Test Equipment','Machinery',
                 'Generators / APU','Protective Equipment','SCBA / Breathing Apparatus',
                 'Comms','Optics','Electronic / Sensors','Respiratory','Other'];

async function equipmentPage() {
  $('page-actions').innerHTML = `
    ${isAdmin() ? `<button onclick="openCsvImport('equipment')" class="btn-secondary" style="font-size:0.8rem;">⬆ Import CSV</button>` : ''}
    <a href="/api/csv/equipment/export" download="equipment.csv" class="btn-secondary" style="font-size:0.8rem;text-decoration:none;">⬇ Export CSV</a>
    ${isAdmin() ? `<button onclick="openEquipmentModal()" class="btn-primary">+ Add Equipment</button>` : ''}`;
  await refreshEquipment();
}

async function refreshEquipment() {
  equipmentData = await api('GET', '/api/equipment');
  renderEquipmentTable(equipmentData);
}

function renderEquipmentTable(rows) {
  $('page-content').innerHTML = `
    <div class="card overflow-hidden p-0">
      <div class="px-5 py-4 border-b flex items-center gap-3">
        <input id="eq-search" class="input max-w-xs" placeholder="Search equipment…" oninput="filterEquipment(this.value)">
        <select id="eq-cat-filter" class="input w-44" onchange="filterEquipment()">
          <option value="">All categories</option>
          ${[...new Set(equipmentData.map(e=>e.category))].sort().map(c=>`<option>${esc(c)}</option>`).join('')}
        </select>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50 text-xs text-gray-500 uppercase tracking-wide">
            <tr>
              <th class="px-4 py-3 text-left">Name</th>
              <th class="px-4 py-3 text-left col-m-hide">Category</th>
              <th class="px-4 py-3 text-left col-m-hide">Serial #</th>
              <th class="px-4 py-3 text-left col-m-hide">Location</th>
              <th class="px-4 py-3 text-left">Status</th>
              <th class="px-4 py-3 text-left">Maintenance</th>
              <th class="px-4 py-3 text-left col-m-hide">Cal Due</th>
              <th class="px-4 py-3 text-right">Actions</th>
            </tr>
          </thead>
          <tbody id="eq-tbody">${equipmentRows(rows)}</tbody>
        </table>
      </div>
    </div>`;
}

function equipmentRows(rows) {
  const sc = {active:'badge-green',inactive:'badge-gray',retired:'badge-red'};
  return rows.map(e=>`
    <tr class="table-row border-b last:border-0">
      <td class="px-4 py-3">
        <button onclick="openEqDetail(${e.id})" style="font-weight:600;color:#141414;background:none;border:none;cursor:pointer;padding:0;text-align:left;">${esc(e.name)}</button>
      </td>
      <td class="px-4 py-3 text-gray-500 col-m-hide">${esc(e.category)}</td>
      <td class="px-4 py-3 text-gray-500 font-mono text-xs col-m-hide">${esc(e.serial_num||'—')}</td>
      <td class="px-4 py-3 text-gray-500 col-m-hide">${esc(e.location||'—')}</td>
      <td class="px-4 py-3"><span class="${sc[e.status]||'badge-gray'}">${e.status}</span></td>
      <td class="px-4 py-3">
        ${e.overdue_tasks ? `<span class="badge-red">${e.overdue_tasks} overdue</span>` :
          e.pending_tasks ? `<span class="badge-blue">${e.pending_tasks} pending</span>` :
          `<span class="badge-green">OK</span>`}
      </td>
      <td class="px-4 py-3 col-m-hide">${dueBadge(e.cal_next_due)}</td>
      <td class="px-4 py-3 text-right" style="white-space:nowrap;">
        <button onclick="openQRModal(${e.id},'${esc(e.name)}')" class="text-gray-400 hover:text-gray-700 text-xs mr-3" title="QR Code">&#9641; QR</button>
        ${isAdmin() ? `<button onclick="openEquipmentModal(${e.id})" class="text-gray-800 hover:underline text-xs mr-3">Edit</button>` : ''}
        ${isAdmin() ? `<button onclick="deleteEquipment(${e.id})" class="text-red-500 hover:underline text-xs">Delete</button>` : ''}
      </td>
    </tr>`).join('') || '<tr><td colspan="8" class="px-4 py-8 text-center text-gray-400">No equipment found.</td></tr>';
}

function filterEquipment(search) {
  const s = (search ?? $('eq-search').value).toLowerCase();
  const cat = $('eq-cat-filter')?.value || '';
  const filtered = equipmentData.filter(e =>
    (!s || e.name.toLowerCase().includes(s) || (e.serial_num||'').toLowerCase().includes(s) || (e.location||'').toLowerCase().includes(s)) &&
    (!cat || e.category === cat)
  );
  $('eq-tbody').innerHTML = equipmentRows(filtered);
}

// ── Equipment Detail (tabbed) ─────────────────────────────────────────────────
async function openEqDetail(id) {
  const eq = equipmentData.find(e=>e.id===id);
  if (!eq) return;

  const [tasks, cals, atts, hist] = await Promise.all([
    api('GET', `/api/maintenance?equipment_id=${id}`),
    api('GET', `/api/calibration?equipment_id=${id}`),
    api('GET', `/api/attachments/${id}`),
    api('GET', `/api/audit/equipment/${id}`),
  ]);

  const sc = {active:'badge-green',inactive:'badge-gray',retired:'badge-red'};

  modal(`<div class="modal" style="max-width:700px">
    <div class="px-6 py-4 border-b flex items-start justify-between gap-4">
      <div>
        <div class="font-semibold text-lg">${esc(eq.name)}</div>
        <div class="text-xs text-gray-400 mt-0.5">${esc(eq.category)}${eq.serial_num?' · S/N: '+esc(eq.serial_num):''}</div>
      </div>
      <button onclick="closeModal()" style="color:#9ca3af;font-size:1.5rem;line-height:1;background:none;border:none;cursor:pointer;flex-shrink:0;">&times;</button>
    </div>

    <!-- Tabs -->
    <div style="display:flex;border-bottom:1px solid #e5e7eb;padding:0 1.5rem;" id="eq-detail-tabs">
      <button onclick="eqTab('details')" id="tab-details" class="eq-tab active-tab">Details</button>
      <button onclick="eqTab('maintenance')" id="tab-maintenance" class="eq-tab">Maintenance <span id="mt-count-badge" style="margin-left:4px;font-size:0.7rem;background:#dce8f5;color:#141414;border-radius:9999px;padding:1px 7px;">${tasks.filter(t=>t.status!=='completed').length||''}</span></button>
      <button onclick="eqTab('calibration')" id="tab-calibration" class="eq-tab">Calibration <span id="cal-count-badge" style="margin-left:4px;font-size:0.7rem;background:#dcfce7;color:#15803d;border-radius:9999px;padding:1px 7px;">${cals.length||''}</span></button>
      <button onclick="eqTab('attachments')" id="tab-attachments" class="eq-tab">Attachments <span id="att-count-badge" style="margin-left:4px;font-size:0.7rem;background:#f3f4f6;color:#4b5563;border-radius:9999px;padding:1px 7px;">${atts.length||''}</span></button>
      <button onclick="eqTab('history')" id="tab-history" class="eq-tab">History</button>
    </div>

    <div id="eq-detail-body" style="padding:1.5rem;min-height:280px;">
      <!-- filled by eqTab() -->
    </div>
  </div>`, () => {
    // store on window for tab switching
    window._eqDetail = { id, eq, tasks, cals, atts, hist };
    eqTab('details');
  });
}

// inject tab styles once
if (!document.getElementById('eq-tab-style')) {
  const s = document.createElement('style');
  s.id = 'eq-tab-style';
  s.textContent = `
    .eq-tab { background:none; border:none; cursor:pointer; padding:0.6rem 1rem; font-size:0.875rem; font-weight:500; color:#6b7280; border-bottom:2px solid transparent; margin-bottom:-1px; }
    .eq-tab:hover { color:#141414; }
    .eq-tab.active-tab { color:#141414; border-bottom-color:#141414; }
  `;
  document.head.appendChild(s);
}

function eqTab(tab) {
  document.querySelectorAll('.eq-tab').forEach(b => b.classList.toggle('active-tab', b.id===`tab-${tab}`));
  const { id, eq, tasks, cals, atts } = window._eqDetail;
  const body = $('eq-detail-body');

  if (tab === 'details') {
    const sc = {active:'badge-green',inactive:'badge-gray',retired:'badge-red'};
    const lcDate = (d, label) => d ? `<div><div class="label">${label}</div><div style="font-size:0.875rem;">${fmtDate(d)} ${daysUntil(d)<0?'<span style="color:#dc2626;font-size:0.72rem;font-weight:700;">EXPIRED</span>':daysUntil(d)<=90?`<span style="color:#b45309;font-size:0.72rem;font-weight:600;">(${daysUntil(d)}d)</span>`:''}</div></div>` : '';
    body.innerHTML = `
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem;">
        <div><div class="label">Status</div><span class="${sc[eq.status]||'badge-gray'}" style="font-size:0.8rem;">${eq.status}</span></div>
        <div><div class="label">Assigned To</div><div style="font-size:0.875rem;font-weight:${eq.assigned_to?'600':'400'};color:${eq.assigned_to?'#141414':'#9ca3af'};">${esc(eq.assigned_to||'—')}</div></div>
        <div><div class="label">Location</div><div style="font-size:0.875rem;">${esc(eq.location||'—')}</div></div>
        <div><div class="label">Manufacturer</div><div style="font-size:0.875rem;">${esc(eq.manufacturer||'—')}</div></div>
        <div><div class="label">Model</div><div style="font-size:0.875rem;">${esc(eq.model||'—')}</div></div>
        <div><div class="label">Serial #</div><div style="font-size:0.875rem;font-family:monospace;">${esc(eq.serial_num||'—')}</div></div>
        <div><div class="label">Category</div><div style="font-size:0.875rem;">${esc(eq.category)}</div></div>
        ${eq.notes?`<div style="grid-column:1/-1"><div class="label">Notes</div><div style="font-size:0.875rem;color:#4b5563;">${esc(eq.notes)}</div></div>`:''}
      </div>
      ${(eq.purchase_date||eq.warranty_expiry||eq.end_of_life_date) ? `
      <div style="background:#f8fafc;border:1px solid #dce8f5;border-radius:0.5rem;padding:0.75rem 1rem;margin-bottom:1rem;">
        <div style="font-size:0.72rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:0.5rem;">Lifecycle</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.75rem;">
          ${eq.purchase_date?`<div><div class="label" style="font-size:0.72rem;">Purchased</div><div style="font-size:0.8rem;">${fmtDate(eq.purchase_date)}</div></div>`:''}
          ${lcDate(eq.warranty_expiry,'Warranty Expiry')}
          ${lcDate(eq.end_of_life_date,'End of Life')}
        </div>
      </div>` : ''}
      <div style="display:flex;gap:0.75rem;padding-top:0.5rem;border-top:1px solid #f3f4f6;">
        ${isAdmin() ? `<button onclick="openEquipmentModal(${id}); closeModal();" class="btn-primary" style="font-size:0.8rem;padding:0.4rem 0.9rem;">Edit Details</button>` : ''}
        ${isAdmin() ? `<button onclick="deleteEquipment(${id})" class="btn-secondary" style="font-size:0.8rem;padding:0.4rem 0.9rem;color:#dc2626;border-color:#fca5a5;">Delete Equipment</button>` : ''}
      </div>`;
  }

  else if (tab === 'maintenance') {
    const activeTasks = tasks.filter(t => t.status !== 'completed');
    const doneTasks   = tasks.filter(t => t.status === 'completed');
    body.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <div style="font-weight:600;font-size:0.875rem;">Maintenance Tasks</div>
        ${isAdmin() ? `<button onclick="openEqTaskModal(${id})" class="btn-primary" style="font-size:0.75rem;padding:0.35rem 0.8rem;">+ Add Task</button>` : ''}
      </div>
      ${activeTasks.length === 0 && doneTasks.length === 0 ? '<p style="font-size:0.875rem;color:#9ca3af;">No maintenance tasks recorded.</p>' : ''}
      ${activeTasks.map(t => eqTaskRow(t)).join('')}
      ${doneTasks.length ? `
        <details style="margin-top:0.75rem;">
          <summary style="font-size:0.75rem;color:#6b7280;cursor:pointer;padding:0.25rem 0;">${doneTasks.length} completed task${doneTasks.length>1?'s':''}</summary>
          <div style="margin-top:0.5rem;">${doneTasks.map(t=>eqTaskRow(t)).join('')}</div>
        </details>` : ''}`;
  }

  else if (tab === 'calibration') {
    body.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <div style="font-weight:600;font-size:0.875rem;">Calibration Records</div>
        <button onclick="openEqCalModal(${id})" class="btn-primary" style="font-size:0.75rem;padding:0.35rem 0.8rem;">+ Log Calibration</button>
      </div>
      ${cals.length === 0 ? '<p style="font-size:0.875rem;color:#9ca3af;">No calibration records.</p>' : cals.map(c => eqCalRow(c)).join('')}`;
  }

  else if (tab === 'attachments') {
    const isImage = t => /^image\//i.test(t);
    body.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <div style="font-weight:600;font-size:0.875rem;">Attachments</div>
      </div>

      <!-- Upload zone -->
      <label id="att-drop" style="display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px dashed #d1d5db;border-radius:0.75rem;padding:1.5rem 1rem;cursor:pointer;margin-bottom:1rem;transition:border-color 200ms;gap:0.4rem;"
             ondragover="event.preventDefault();this.style.borderColor='#141414'"
             ondragleave="this.style.borderColor='#d1d5db'"
             ondrop="eqHandleDrop(event,${id})">
        <svg style="width:2rem;height:2rem;color:#9ca3af;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
        </svg>
        <span style="font-size:0.8rem;color:#6b7280;">Drop files here or <span style="color:#141414;font-weight:600;">click to browse</span></span>
        <span style="font-size:0.7rem;color:#9ca3af;">Photos, PDFs, documents — max 50 MB each</span>
        <input type="file" id="att-file-input" multiple style="display:none"
               accept=".jpg,.jpeg,.png,.gif,.webp,.pdf,.doc,.docx,.xls,.xlsx,.csv,.txt,.zip"
               onchange="eqUploadFiles(this.files,${id})">
      </label>
      <div id="att-upload-progress" style="display:none;margin-bottom:0.75rem;">
        <div style="font-size:0.75rem;color:#6b7280;margin-bottom:0.25rem;" id="att-progress-label">Uploading…</div>
        <div style="background:#e5e7eb;border-radius:9999px;height:6px;">
          <div id="att-progress-bar" style="background:#141414;height:6px;border-radius:9999px;width:0%;transition:width 200ms;"></div>
        </div>
      </div>

      <!-- File grid -->
      <div id="att-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:0.75rem;">
        ${atts.length === 0
          ? '<p style="font-size:0.875rem;color:#9ca3af;grid-column:1/-1;">No attachments yet.</p>'
          : atts.map(a => eqAttCard(a, id)).join('')}
      </div>`;

    // wire the label click to the hidden input
    $('att-drop').addEventListener('click', e => {
      if (e.target.tagName !== 'INPUT') $('att-file-input').click();
    });
  }

  else if (tab === 'history') {
    const _ACTION_COLORS = { created:'#dcfce7', updated:'#dce8f5', completed:'#f0fdf4', deleted:'#fef2f2', calibrated:'#ede9fe' };
    const _ACTION_LABELS = { created:'Created', updated:'Updated', completed:'Completed', deleted:'Deleted', calibrated:'Calibrated' };
    body.innerHTML = `
      <div style="font-weight:600;font-size:0.875rem;margin-bottom:1rem;">Audit History</div>
      ${hist.length === 0
        ? '<p style="font-size:0.875rem;color:#9ca3af;">No history recorded yet.</p>'
        : `<div style="display:flex;flex-direction:column;gap:0.5rem;">
            ${hist.map(h => {
              let detail = '';
              try { const d = JSON.parse(h.detail||'{}'); detail = Object.entries(d).filter(([,v])=>v).map(([k,v])=>`<span style="color:#6b7280;">${k}:</span> ${esc(String(v))}`).join(' · '); } catch(e){}
              return `<div style="display:flex;gap:0.75rem;align-items:flex-start;padding:0.5rem 0.75rem;border-radius:0.5rem;background:#f9fafb;border:1px solid #f3f4f6;">
                <span style="font-size:0.7rem;font-weight:700;padding:2px 8px;border-radius:9999px;white-space:nowrap;background:${_ACTION_COLORS[h.action]||'#f3f4f6'};color:#374151;">${_ACTION_LABELS[h.action]||h.action}</span>
                <div style="flex:1;min-width:0;">
                  <div style="font-size:0.78rem;font-weight:500;text-transform:capitalize;">${h.entity_type} ${h.action}</div>
                  ${detail ? `<div style="font-size:0.72rem;color:#9ca3af;margin-top:0.1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${detail}</div>` : ''}
                  ${h.actor ? `<div style="font-size:0.72rem;color:#6b7280;">by ${esc(h.actor)}</div>` : ''}
                </div>
                <span style="font-size:0.7rem;color:#9ca3af;white-space:nowrap;">${h.created_at.slice(0,16).replace('T',' ')}</span>
              </div>`;
            }).join('')}
          </div>`}`;
  }
}

function eqTaskRow(t) {
  const sc = {pending:'badge-blue',overdue:'badge-red',completed:'badge-green'};
  const isDone = t.status === 'completed';
  return `<div style="border:1px solid #e5e7eb;border-radius:0.5rem;padding:0.75rem 1rem;margin-bottom:0.5rem;background:${isDone?'#f9fafb':'#fff'};">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:0.5rem;">
      <div style="flex:1;">
        <div style="font-size:0.875rem;font-weight:600;">${esc(t.title)}</div>
        <div style="display:flex;gap:0.5rem;margin-top:0.35rem;flex-wrap:wrap;">
          <span class="${sc[t.status]||'badge-gray'}">${t.status}</span>
          ${t.task_type !== 'scheduled' ? `<span class="badge-gray">${t.task_type}</span>` : ''}
          ${t.next_due ? `<span style="font-size:0.75rem;color:#6b7280;">Due: ${fmtDate(t.next_due)}</span>` : ''}
          ${t.last_done ? `<span style="font-size:0.75rem;color:#6b7280;">Last: ${fmtDate(t.last_done)}</span>` : ''}
          ${t.interval_days ? `<span style="font-size:0.75rem;color:#6b7280;">Every ${t.interval_days}d</span>` : ''}
          ${t.assigned_to ? `<span style="font-size:0.75rem;color:#6b7280;">→ ${esc(t.assigned_to)}</span>` : ''}
        </div>
        ${t.notes ? `<div style="font-size:0.75rem;color:#6b7280;margin-top:0.25rem;">${esc(t.notes)}</div>` : ''}
      </div>
      <div style="display:flex;gap:0.5rem;flex-shrink:0;">

function eqAttCard(a, eqId) {
  const isImg = /^image\//i.test(a.file_type || '');
  const isPdf = (a.file_type || '').includes('pdf');
  const url   = `/api/attachments/${eqId}/file/${a.id}`;
  const thumb = isImg
    ? `<img src="${url}" alt="${esc(a.original_name)}" style="width:100%;height:90px;object-fit:cover;border-radius:0.5rem 0.5rem 0 0;">`
    : `<div style="height:90px;display:flex;align-items:center;justify-content:center;background:#f3f4f6;border-radius:0.5rem 0.5rem 0 0;">
         <svg style="width:2.5rem;height:2.5rem;color:${isPdf?'#ef4444':'#6b7280'};" fill="none" stroke="currentColor" viewBox="0 0 24 24">
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/>
         </svg>
       </div>`;
  const kb = a.file_size ? (a.file_size < 1048576 ? Math.round(a.file_size/1024)+'KB' : (a.file_size/1048576).toFixed(1)+'MB') : '';
  return `<div style="border:1px solid #e5e7eb;border-radius:0.5rem;overflow:hidden;font-size:0.72rem;">
    <a href="${url}" target="_blank" style="display:block;text-decoration:none;cursor:zoom-in;">${thumb}</a>
    <div style="padding:0.4rem 0.5rem;">
      <div style="color:#374151;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${esc(a.original_name)}">${esc(a.original_name)}</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:0.2rem;">
        <span style="color:#9ca3af;">${kb}</span>
        <button onclick="eqDeleteAtt(${a.id},${eqId})" style="color:#ef4444;background:none;border:none;cursor:pointer;font-size:0.7rem;padding:0;">✕ remove</button>
      </div>
    </div>
  </div>`;
}

async function eqHandleDrop(e, eqId) {
  e.preventDefault();
  $('att-drop').style.borderColor = '#d1d5db';
  await eqUploadFiles(e.dataTransfer.files, eqId);
}

async function eqUploadFiles(files, eqId) {
  if (!files || files.length === 0) return;
  const prog = $('att-upload-progress');
  const bar  = $('att-progress-bar');
  const lbl  = $('att-progress-label');
  prog.style.display = 'block';

  for (let i = 0; i < files.length; i++) {
    const f = files[i];
    lbl.textContent = `Uploading ${i+1}/${files.length}: ${f.name}`;
    bar.style.width = `${Math.round((i/files.length)*100)}%`;
    try {
      const fd = new FormData();
      fd.append('file', f);
      const r = await fetch(`/api/attachments/${eqId}`, { method:'POST', body:fd, headers:{'Authorization':'Bearer '+(getToken()||'')} });
      if (!r.ok) { const e=await r.json().catch(()=>({})); toast(e.detail||'Upload failed', false); }
    } catch(err) { toast(err.message, false); }
  }
  bar.style.width = '100%';
  setTimeout(() => { prog.style.display = 'none'; bar.style.width='0%'; }, 600);
  toast(`${files.length} file${files.length>1?'s':''} uploaded.`);
  await _refreshEqDetail(eqId);
}

async function eqDeleteAtt(attId, eqId) {
  if (!confirm('Remove this attachment?')) return;
  await api('DELETE', `/api/attachments/${eqId}/${attId}`);
  toast('Attachment removed.');
  await _refreshEqDetail(eqId);
}

async function _refreshEqDetail(eqId) {
  const [tasks, cals, atts, hist, eqList] = await Promise.all([
    api('GET', `/api/maintenance?equipment_id=${eqId}`),
    api('GET', `/api/calibration?equipment_id=${eqId}`),
    api('GET', `/api/attachments/${eqId}`),
    api('GET', `/api/audit/equipment/${eqId}`),
    api('GET', '/api/equipment'),
  ]);
  equipmentData = eqList;
  const eq = equipmentData.find(e=>e.id===eqId) || window._eqDetail.eq;
  const prevTab = document.querySelector('.eq-tab.active-tab')?.id?.replace('tab-','') || 'maintenance';
  window._eqDetail = { id: eqId, eq, tasks, cals, atts, hist };
  const mtBadge  = $('mt-count-badge');
  const calBadge = $('cal-count-badge');
  const attBadge = $('att-count-badge');
  if (mtBadge)  mtBadge.textContent  = tasks.filter(t=>t.status!=='completed').length || '';
  if (calBadge) calBadge.textContent = cals.length || '';
  if (attBadge) attBadge.textContent = atts.length || '';
  eqTab(prevTab);
}

function eqLocationChange(sel) {
  const newInput = document.getElementById('eq-location-new');
  const hiddenVal = document.getElementById('eq-location-val');
  if (sel.value === '__new__') {
    newInput.style.display = 'block';
    newInput.focus();
    hiddenVal.value = '';
  } else {
    newInput.style.display = 'none';
    hiddenVal.value = sel.value;
  }
}

function syncNewLocation(input) {
  document.getElementById('eq-location-val').value = input.value.trim();
}

function eqAssignedChange(sel) {
  const newInput = document.getElementById('eq-assigned-new');
  const hiddenVal = document.getElementById('eq-assigned-val');
  if (sel.value === '__new__') {
    newInput.style.display = 'block';
    newInput.focus();
    hiddenVal.value = '';
  } else {
    newInput.style.display = 'none';
    hiddenVal.value = sel.value;

}

      <div><label class="label">Completed By</label><input class="input" name="completed_by"></div>
      <div><label class="label">Override Next Due</label><input class="input" type="date" name="next_due"></div>

        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.6rem;">
          <div style="font-size:0.8rem;font-weight:700;color:#374151;">Parts Used (optional)</div>
          <button type="button" onclick="addCompletePartRow()" class="btn-secondary" style="font-size:0.75rem;padding:0.25rem 0.6rem;">+ Add Part</button>
        </div>
        <div id="complete-parts-list" style="display:flex;flex-direction:column;gap:0.5rem;"></div>
      </div>

      <div class="flex justify-end gap-3 pt-2">

        <button type="submit" class="btn-primary">Mark Complete</button>
      </div>
    </form>
  </div>`);
}

function addCompletePartRow() {
  const idx = _completePartsRows.length;
  _completePartsRows.push({ item_id: '', quantity_used: 1 });
  const optionsHtml = _inventoryForComplete.map(i =>
    `<option value="${i.id}">${esc(i.name)}${i.part_number ? ' ('+esc(i.part_number)+')' : ''} — ${i.quantity} ${esc(i.unit)} on hand</option>`
  ).join('');
  const row = document.createElement('div');
  row.id = `cpart-${idx}`;
  row.style.cssText = 'display:flex;gap:0.5rem;align-items:center;';
  row.innerHTML = `
    <select class="input" style="flex:2;" onchange="_completePartsRows[${idx}].item_id=parseInt(this.value)">
      <option value="">— Select part —</option>${optionsHtml}
    </select>
    <input type="number" class="input" style="width:5rem;" min="0.01" step="0.01" value="1"
           placeholder="Qty" oninput="_completePartsRows[${idx}].quantity_used=parseFloat(this.value)||1">
    <button type="button" onclick="document.getElementById('cpart-${idx}').remove();_completePartsRows[${idx}]=null;"
            style="color:#dc2626;background:none;border:none;cursor:pointer;font-size:1.1rem;padding:0 0.25rem;">✕</button>`;
  document.getElementById('complete-parts-list').appendChild(row);
}

async function submitComplete(e, id) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = Object.fromEntries(fd);
  const parts = _completePartsRows.filter(p => p && p.item_id);
  if (parts.length) body.parts_used = parts;
  try {
    await api('POST', `/api/maintenance/${id}/complete`, body);
    closeModal();
    toast('Task completed.');
    maintenanceData = await api('GET', '/api/maintenance');
    renderMaintenanceTable(maintenanceData);
  } catch(err) { toast(err.message, false); }
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  await api('DELETE', `/api/maintenance/${id}`);
  toast('Deleted.');
  maintenanceData = await api('GET', '/api/maintenance');
  renderMaintenanceTable(maintenanceData);
}

function inventoryRows(rows) {

    return `<tr class="table-row border-b last:border-0">
      <td class="px-4 py-3 font-medium">${esc(i.name)}</td>

      <td class="px-4 py-3 text-right text-gray-400 col-m-hide">${i.min_stock} ${i.unit}</td>
      <td class="px-4 py-3">${low?'<span class="badge-yellow">Low</span>':'<span class="badge-green">OK</span>'}</td>

function filterInventory() {
  const s = $('inv-search').value.toLowerCase();
  const low = $('inv-low-filter').checked;
  const filtered = inventoryData.filter(i =>
    (!s || i.name.toLowerCase().includes(s) || (i.part_number||'').toLowerCase().includes(s) || (i.location||'').toLowerCase().includes(s)) &&
    (!low || (i.min_stock > 0 && i.quantity <= i.min_stock))
  );
  $('inv-tbody').innerHTML = inventoryRows(filtered);
}

        <div><label class="label">Min Stock</label><input class="input" type="number" name="min_stock" min="0" value="${i.min_stock||0}"></div>
        <div><label class="label">Unit Cost ($)</label><input class="input" type="number" step="0.01" name="unit_cost" value="${i.unit_cost||''}"></div>

      </div>

  </div>`);
}

async function saveItem(e, id) {
  e.preventDefault();
  const body = Object.fromEntries(new FormData(e.target));
  if (body.quantity) body.quantity = parseInt(body.quantity);
  if (body.min_stock) body.min_stock = parseInt(body.min_stock);
  if (body.unit_cost) body.unit_cost = parseFloat(body.unit_cost);
  try {
    if (id) await api('PUT', `/api/inventory/${id}`, body);
    else await api('POST', '/api/inventory', body);
    closeModal();
    toast(id ? 'Item updated.' : 'Item added.');
    inventoryData = await api('GET', '/api/inventory');
    renderInventoryTable(inventoryData);
  } catch(err) { toast(err.message, false); }

function pmcsItemRow(it, idx) {
  const INT_COLORS = {B:'#1d4ed8',D:'#0369a1',A:'#0f766e',W:'#7c3aed',M:'#b45309'};

async function addPmcsItem(e, tmplId) {
  e.preventDefault();
  const body = Object.fromEntries(new FormData(e.target));
  body.order_index = document.querySelectorAll('[id^="pmcs-row-"]').length;
  await api('POST', `/api/pmcs/templates/${tmplId}/items`, body);
  toast('Item added.');
  closeModal();
  openPmcsItems(tmplId);
}

async function deletePmcsItem(itemId) {
  if (!confirm('Delete this check item?')) return;
  await api('DELETE', `/api/pmcs/items/${itemId}`);
  document.getElementById('pmcs-row-' + itemId)?.remove();
  toast('Item removed.');
}

function csvFileSelected(input) {
  const f = input.files[0];
  if (!f) return;
  document.getElementById('csv-filename').textContent = f.name;
  document.getElementById('csv-submit-btn').disabled = false;
  document.getElementById('csv-result').style.display = 'none';
}

function csvHandleDrop(e) {
  e.preventDefault();
  document.getElementById('csv-drop-zone').style.borderColor = '#d1d5db';
  const f = e.dataTransfer.files[0];
  if (!f) return;
  document.getElementById('csv-file-input').files; // can't set directly
  // manually assign via DataTransfer workaround
  const dt = new DataTransfer();
  dt.items.add(f);
  document.getElementById('csv-file-input').files = dt.files;
  csvFileSelected(document.getElementById('csv-file-input'));
}

async function csvSubmit(type, pmcsTemplateId) {
  const cfg = CSV_CONFIG[type];
  if (type === 'pmcs-items' && pmcsTemplateId) {
    cfg.uploadUrl = `/api/csv/pmcs/${pmcsTemplateId}/items/import`;
    cfg.refreshFn = () => { closeModal(); openPmcsItems(pmcsTemplateId); };
  }
  const fileInput = document.getElementById('csv-file-input');
  if (!fileInput.files.length) return;

  const btn = document.getElementById('csv-submit-btn');
  btn.disabled = true;
  btn.textContent = 'Importing…';

  const fd = new FormData();
  fd.append('file', fileInput.files[0]);

  try {
    const r = await fetch(cfg.uploadUrl, { method: 'POST', body: fd, headers:{'Authorization':'Bearer '+(getToken()||'')} });
    const data = await r.json();
    const resultEl = document.getElementById('csv-result');
    resultEl.style.display = 'block';

    if (!r.ok) {
      resultEl.style.background = '#fef2f2';
      resultEl.style.border = '1px solid #fca5a5';
      resultEl.innerHTML = `<strong style="color:#dc2626;">Import failed:</strong> ${data.detail || 'Unknown error'}`;
      btn.disabled = false;
      btn.textContent = 'Import';
      return;
    }

    const hasErrors = data.errors && data.errors.length > 0;
    resultEl.style.background = hasErrors ? '#fffbeb' : '#f0fdf4';
    resultEl.style.border = `1px solid ${hasErrors ? '#fcd34d' : '#86efac'}`;
    resultEl.innerHTML = `
      <div style="font-weight:600;color:${hasErrors ? '#92400e' : '#15803d'};">
        ✓ Import complete
      </div>
      <div style="margin-top:0.35rem;color:#374151;">
        ${data.created ? `<span style="margin-right:1rem;">+ ${data.created} created</span>` : ''}
        ${data.updated ? `<span style="margin-right:1rem;">↻ ${data.updated} updated</span>` : ''}
        ${data.skipped ? `<span style="color:#b45309;">${data.skipped} skipped</span>` : ''}
      </div>
      ${hasErrors ? `<div style="margin-top:0.5rem;font-size:0.72rem;color:#92400e;">${data.errors.slice(0,5).join('<br>')}</div>` : ''}
    `;
    btn.textContent = 'Done';
    if (cfg.refreshFn) cfg.refreshFn();
  } catch(err) {
    toast('Import failed: ' + err.message, false);
    btn.disabled = false;
    btn.textContent = 'Import';
  }
}

async function saveSko(e, id) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const eqIds = fd.getAll('eq_ids').map(Number);
  const body = {
    name: fd.get('name'),
    nsn: fd.get('nsn') || null,
    description: fd.get('description') || null,
    notes: fd.get('notes') || null,
    equipment_ids: eqIds,
  };
  try {
    if (id) await api('PUT', `/api/skos/${id}`, body);
    else await api('POST', '/api/skos', body);
    document.getElementById('sko-modal-backdrop').remove();
    toast(id ? 'SKO updated.' : 'SKO created.');
    await skosPage();
  } catch(err) { toast(err.message, false); }
}

async function deleteSko(id, name) {
  if (!confirm(`Delete SKO "${name}" and all its records?`)) return;
  try {
    await api('DELETE', `/api/skos/${id}`);
    toast('SKO deleted.');
    await skosPage();
  } catch(err) { toast(err.message, false); }
}

async function removeSkoEquipment(skoId, eqId) {

async function confirmAddEquipment(skoId) {
  const checks = document.querySelectorAll('#sko-addeq-backdrop input[name="eq_ids"]:checked');
  const ids = Array.from(checks).map(c => Number(c.value));
  if (!ids.length) { toast('Select at least one item.', false); return; }
  try {
    await Promise.all(ids.map(id => api('POST', `/api/skos/${skoId}/equipment/${id}`, {})));
    document.getElementById('sko-addeq-backdrop').remove();
    document.getElementById('sko-detail-backdrop').remove();
    toast(`Added ${ids.length} equipment item${ids.length!==1?'s':''}.`);
    skosData = await api('GET', '/api/skos');
    await openSkoDetail(skoId);
  } catch(err) { toast(err.message, false); }
}

async function submitSkoParts(e, skoId) {

    item_id: Number(fd.get('item_id')),
    quantity: parseFloat(fd.get('quantity')),
    used_by: fd.get('used_by') || null,

            <td class="px-4 py-3 font-medium">${esc(u.username)}</td>
            <td class="px-4 py-3"><span class="${u.role==='admin'?'badge-red':'badge-blue'}">${u.role}</span></td>
            <td class="px-4 py-3 text-gray-500 col-m-hide">${u.created_at ? fmtDate(u.created_at.slice(0,10)) : '—'}</td>
            <td class="px-4 py-3 text-gray-500 col-m-hide">${u.last_login ? fmtDate(u.last_login.slice(0,10)) : 'Never'}</td>
            <td class="px-4 py-3 text-right space-x-2">
              <button onclick="openUserModal(${u.id})" class="text-gray-700 hover:underline text-xs">Edit</button>
              <button onclick="deleteUser(${u.id},'${esc(u.username)}')" class="text-red-500 hover:underline text-xs">Delete</button>
            </td>
          </tr>`).join('') || '<tr><td colspan="5" class="px-4 py-8 text-center text-gray-400">No users found.</td></tr>'}
        </tbody>
      </table>
    </div>`;
}

function openUserModal(id) {
  const u = id ? usersData.find(x => x.id === id) : {};
  const isEdit = !!id;
  modal(`<div class="modal">
    <div class="px-6 py-4 border-b flex items-center justify-between">
      <h2 style="font-weight:600;">${isEdit ? 'Edit' : 'Add'} User</h2>
      <button onclick="closeModal()" style="color:#9ca3af;font-size:1.5rem;line-height:1;background:none;border:none;cursor:pointer;">&times;</button>
    </div>
    <form class="px-6 py-4 space-y-4" onsubmit="saveUser(event,${id||'null'})">
      <div><label class="label">Username *</label>
        <input class="input" name="username" required value="${esc(u?.username||'')}" ${isEdit ? 'readonly style="background:#f9fafb;"' : ''}>
      </div>
      <div>
        <label class="label">${isEdit ? 'New Password (leave blank to keep)' : 'Password *'}</label>
        <div style="position:relative;">
          <input class="input" type="password" id="um-password" name="password" ${isEdit ? '' : 'required'} autocomplete="new-password" style="padding-right:2.5rem;">
          <button type="button" onclick="(()=>{const i=$('um-password');i.type=i.type==='password'?'text':'password';})()" tabindex="-1"
                  style="position:absolute;right:0.6rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;font-size:0.8rem;padding:0;">👁</button>
        </div>
      </div>
      ${!isEdit ? `<div>
        <label class="label">Confirm Password *</label>
        <div style="position:relative;">
          <input class="input" type="password" id="um-password2" autocomplete="new-password" style="padding-right:2.5rem;" oninput="checkPwMatch()">
          <button type="button" onclick="(()=>{const i=$('um-password2');i.type=i.type==='password'?'text':'password';})()" tabindex="-1"
                  style="position:absolute;right:0.6rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;font-size:0.8rem;padding:0;">👁</button>
        </div>
        <div id="um-pw-match" style="font-size:0.75rem;margin-top:0.25rem;display:none;"></div>
      </div>` : ''}
      <div><label class="label">Role</label>
        <select class="input" name="role">
          <option value="operator" ${(u?.role||'operator')==='operator'?'selected':''}>operator</option>
          <option value="admin" ${u?.role==='admin'?'selected':''}>admin</option>
        </select>
      </div>
      <div class="flex justify-end gap-3 pt-2">
        <button type="button" onclick="closeModal()" class="btn-secondary">Cancel</button>
        <button type="submit" class="btn-primary">Save</button>
      </div>
    </form>
  </div>`);
}

function checkPwMatch() {
  const p1 = $('um-password'), p2 = $('um-password2'), msg = $('um-pw-match');
  if (!p1 || !p2 || !msg) return;
  if (!p2.value) { msg.style.display='none'; return; }
  const match = p1.value === p2.value;
  msg.style.display = 'block';
  msg.style.color = match ? '#4ade80' : '#f87171';
  msg.textContent = match ? '✓ Passwords match' : '✗ Passwords do not match';
}

async function saveUser(e, id) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const body = Object.fromEntries(fd);
  if (!body.password) {
    delete body.password;
  } else if (!id) {
    const p2 = $('um-password2');
    if (p2 && body.password !== p2.value) {
      toast('Passwords do not match.', false); return;
    }
  }
  try {
    if (id) await api('PUT', `/api/auth/users/${id}`, body);
    else await api('POST', '/api/auth/users', body);
    closeModal();
    toast(id ? 'User updated.' : 'User created.');
    usersData = await api('GET', '/api/auth/users');
    renderUsersTable();
  } catch(err) { toast(err.message, false); }
}

async function deleteUser(id, username) {
  if (!confirm(`Delete user "${username}"?`)) return;
  try {
    await api('DELETE', `/api/auth/users/${id}`);
    toast('User deleted.');
    usersData = await api('GET', '/api/auth/users');
    renderUsersTable();
  } catch(err) { toast(err.message, false); }
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
